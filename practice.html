<!-- UI 组件英文练习 v5.2-001 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fbf8f1">
<title>UI 组件英文练习 · Practice</title>
<style>
/* ============ 设计基础 ============ */
:root {
  --bg: #fbf8f1;
  --bg-card: #ffffff;
  --bg-card-hover: #fef5ec;
  --ink: #1a1a1a;
  --ink-soft: #5a4d40;
  --ink-mute: #8a8175;
  --line: #b8ad95;
  --line-soft: #d6cdb8;
  --brand: #c44536;
  --brand-soft: #fef5ec;
  --brand-deep: #8a2f24;
  --success: #2d8659;
  --success-soft: #e6f3ec;
  --error: #c44536;
  --error-soft: #fbe8e5;
  --warm: #d4a23f;

  --serif: "Playfair Display", "Georgia", "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Menlo", "Consolas", monospace;
  --ipa-font: "Charis SIL", "Doulos SIL", "Lucida Sans Unicode", "Segoe UI", serif;

  --radius: 14px;
  --radius-sm: 8px;
  --shadow-soft: 0 1px 3px rgba(26,26,26,0.04), 0 8px 24px -12px rgba(26,26,26,0.08);
  --shadow-pop: 0 4px 16px rgba(196,69,54,0.12), 0 12px 32px -16px rgba(26,26,26,0.18);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: contain;
  min-height: 100vh;
}

body {
  background:
    radial-gradient(circle at 20% 0%, rgba(196,69,54,0.04), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(212,162,63,0.05), transparent 50%),
    var(--bg);
}

button { font-family: inherit; cursor: pointer; border: none; background: none; padding: 0; }
input, select { font-family: inherit; font-size: inherit; }
img, svg { display: block; max-width: 100%; }

/* ============ 顶栏 ============ */
.app {
  max-width: 540px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom);
}

.topbar {
  position: sticky;
  top: 0;
  background: rgba(251,248,241,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 50;
  padding: 12px 18px;
  padding-top: max(12px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-title {
  flex: 1;
  display: flex;
  flex-direction: column;
  line-height: 1.15;
}
.topbar-title .zh {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.topbar-title .en {
  font-family: var(--serif);
  font-style: italic;
  font-size: 11px;
  color: var(--ink-mute);
  margin-top: 1px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  color: var(--ink);
  border: 1px solid transparent;
  transition: background .15s, border-color .15s, transform .1s;
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn:hover { background: var(--bg-card-hover); }
.icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ============ 进度条 ============ */
.progress-bar {
  position: relative;
  height: 3px;
  background: var(--line-soft);
  overflow: hidden;
}
.progress-bar::after {
  content: '';
  display: block;
  height: 100%;
  width: var(--progress, 0%);
  background: var(--brand);
  transition: width .3s ease;
}

/* ============ 主内容区 ============ */
.main {
  flex: 1;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* === 题目卡 === */
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  position: relative;
}

.q-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 12px;
}
.q-meta .chapter { color: var(--brand); font-weight: 700; }
.q-meta .counter { font-variant-numeric: tabular-nums; }

.q-illust {
  width: 100%;
  aspect-ratio: 5 / 2;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin-bottom: 14px;
}
.q-illust svg { width: 88%; height: 88%; }

.q-name {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.q-name .zh {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.q-name .tag {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  background: var(--ink);
  color: #fff;
  border-radius: 3px;
  letter-spacing: 0.08em;
}
.q-name .scope {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
  text-transform: uppercase;
}
.q-name .scope .v-flag { color: var(--warm); font-weight: 700; }

.q-desc {
  font-size: 13.5px;
  color: var(--ink-soft);
  line-height: 1.55;
  margin-top: 2px;
}

.q-prompt {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--line-soft);
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.04em;
  color: var(--brand);
  font-weight: 700;
}
.q-prompt::before {
  content: '? ';
  font-family: var(--serif);
  font-size: 14px;
  font-style: italic;
  font-weight: 800;
  margin-right: 2px;
}

.parent-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0 8px;
  padding: 4px 10px;
  background: var(--brand-soft);
  border: 1px solid var(--brand);
  border-radius: 999px;
  font-size: 11.5px;
  color: var(--brand-deep);
  font-weight: 600;
}
.parent-tag .parent-dot {
  width: 6px;
  height: 6px;
  background: var(--brand);
  border-radius: 50%;
}
.parent-tag strong {
  font-weight: 800;
  letter-spacing: 0.01em;
}

/* === 输入区 === */
.answer-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.mode-tabs {
  display: flex;
  gap: 6px;
  padding: 3px;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: 999px;
  align-self: flex-start;
}
.mode-tab {
  flex: 1;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-mute);
  border-radius: 999px;
  transition: all .15s;
  white-space: nowrap;
}
.mode-tab.active {
  background: var(--ink);
  color: #fff;
}

.input-mode .input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 2px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 0 4px 0 14px;
  transition: border-color .15s, box-shadow .15s;
}
.input-mode .input-wrap:focus-within {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(196,69,54,0.12);
}
.input-mode .input-wrap.correct {
  border-color: var(--success);
  background: var(--success-soft);
}
.input-mode .input-wrap.wrong {
  border-color: var(--error);
  background: var(--error-soft);
  animation: shake .4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-3px); }
}

.text-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  font-style: italic;
  color: var(--ink);
  padding: 14px 0;
  min-width: 0;
}
.text-input::placeholder {
  font-style: italic;
  color: var(--ink-mute);
  font-weight: 400;
}

.submit-btn {
  height: 38px;
  padding: 0 16px;
  background: var(--ink);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .15s, transform .1s;
}
.submit-btn:active { transform: scale(0.96); }
.submit-btn:hover { background: var(--brand); }
.submit-btn:disabled { background: var(--line-soft); cursor: not-allowed; }
.submit-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

/* === 选项模式 === */
.choice-mode {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.choice-btn {
  background: var(--bg-card);
  border: 2px solid var(--line-soft);
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  font-family: var(--serif);
  font-style: italic;
  font-weight: 600;
  font-size: 16px;
  color: var(--ink);
  text-align: center;
  transition: all .12s;
  position: relative;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn:hover { border-color: var(--ink); background: var(--bg-card-hover); }
.choice-btn.correct {
  border-color: var(--success);
  background: var(--success-soft);
  color: var(--success);
}
.choice-btn.wrong {
  border-color: var(--error);
  background: var(--error-soft);
  color: var(--error);
  animation: shake .4s ease;
}
.choice-btn.correct::after {
  content: '✓';
  position: absolute;
  top: 6px;
  right: 8px;
  font-family: var(--sans);
  font-style: normal;
  font-size: 14px;
  font-weight: 900;
}
.choice-btn.wrong::after {
  content: '✗';
  position: absolute;
  top: 6px;
  right: 8px;
  font-family: var(--sans);
  font-style: normal;
  font-size: 14px;
  font-weight: 900;
}
.choice-btn:disabled { cursor: default; pointer-events: none; }

/* === 反馈卡(答对/答错后展示) === */
.feedback {
  margin-top: 6px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  gap: 8px;
  border: 1px solid var(--line-soft);
  animation: slideIn .3s ease;
}
.feedback.correct { background: var(--success-soft); border-color: var(--success); }
.feedback.wrong { background: var(--error-soft); border-color: var(--error); }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.fb-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.feedback.correct .fb-title { color: var(--success); }
.feedback.wrong .fb-title { color: var(--error); }
.fb-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
}
.feedback.correct .fb-icon { background: var(--success); color: #fff; }
.feedback.wrong .fb-icon { background: var(--error); color: #fff; }

.fb-answer {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.fb-answer .ans-en {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 800;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.fb-answer .ans-ipa {
  font-family: var(--ipa-font);
  font-size: 16px;
  color: var(--ink-soft);
}
.fb-answer .speak-fb-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--brand);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform .1s, background .15s;
}
.fb-answer .speak-fb-btn:hover { background: var(--brand-deep); }
.fb-answer .speak-fb-btn:active { transform: scale(0.9); }
.fb-answer .speak-fb-btn.playing { animation: pulse 0.6s ease infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); box-shadow: 0 0 0 8px rgba(196,69,54,0.15); }
}
.fb-answer .speak-fb-btn svg { width: 14px; height: 14px; fill: currentColor; stroke: currentColor; }

.fb-extra-names {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  margin-top: 4px;
  font-size: 13px;
  color: var(--ink-soft);
}
.fb-extra-names .name-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.fb-extra-names .name-chip .en {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 600;
}
.fb-extra-names .name-chip .ipa {
  font-family: var(--ipa-font);
  color: var(--ink-mute);
  font-size: 12px;
}
.fb-extra-names .name-chip .mini-speak {
  width: 18px; height: 18px;
  background: transparent;
  color: var(--brand);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.fb-extra-names .name-chip .mini-speak svg { width: 12px; height: 12px; fill: currentColor; }

.next-btn {
  margin-top: 8px;
  width: 100%;
  height: 44px;
  background: var(--brand);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .15s, transform .1s;
}
.next-btn:hover { background: var(--brand-deep); }
.next-btn:active { transform: scale(0.98); }
.next-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

/* === 底部统计栏 === */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px;
  gap: 8px;
}
.stat-cell {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-cell + .stat-cell {
  border-left: 1px solid var(--line-soft);
}
.stat-num {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.stat-num.brand { color: var(--brand); }
.stat-num.success { color: var(--success); }
.stat-label {
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

/* === 设置弹层 === */
.sheet-mask {
  position: fixed;
  inset: 0;
  background: rgba(26,26,26,0.45);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.sheet-mask.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 50%;
  bottom: 0;
  transform: translate(-50%, 100%);
  width: 100%;
  max-width: 540px;
  background: var(--bg);
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  z-index: 101;
  padding: 16px 18px max(20px, env(safe-area-inset-bottom)) 18px;
  transition: transform .3s cubic-bezier(0.32,0.72,0,1);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
}
.sheet.show { transform: translate(-50%, 0); }
.sheet-handle {
  width: 38px;
  height: 4px;
  background: var(--line-soft);
  border-radius: 2px;
  margin: 0 auto 12px;
}
.sheet-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 4px;
}
.sheet-subtitle {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-mute);
  margin-bottom: 14px;
}
.sheet-body {
  overflow-y: auto;
  flex: 1;
  margin: 0 -18px;
  padding: 0 18px;
}

.opt-group { margin-bottom: 18px; }
.opt-group-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}

.opt-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.opt-chip {
  padding: 8px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-card);
  color: var(--ink);
  transition: all .15s;
}
.opt-chip.active {
  background: var(--ink);
  border-color: var(--ink);
  color: #fff;
}
.opt-chip:active { transform: scale(0.96); }

.chap-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.chap-cell {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 1.5px solid var(--line-soft);
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  transition: all .15s;
  text-align: left;
}
.chap-cell.active {
  border-color: var(--brand);
  background: var(--brand-soft);
}
.chap-cell .chap-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--brand);
  flex-shrink: 0;
}
.chap-cell .chap-zh {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
}
.chap-cell.active .chap-zh { color: var(--brand-deep); }

.sheet-action {
  margin-top: 8px;
  display: flex;
  gap: 8px;
}
.sheet-action button {
  flex: 1;
  height: 44px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 700;
}
.sheet-action .secondary {
  background: transparent;
  border: 1.5px solid var(--line);
  color: var(--ink);
}
.sheet-action .primary {
  background: var(--brand);
  color: #fff;
}

/* === 错题本 === */
.review-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 12px;
}
.review-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-sm);
}
.review-svg {
  width: 56px;
  height: 28px;
  flex-shrink: 0;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.review-svg svg { width: 88%; height: 88%; }
.review-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.review-text .zh {
  font-size: 14px;
  font-weight: 700;
}
.review-text .en {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.review-text .ipa {
  font-family: var(--ipa-font);
  font-size: 11px;
  color: var(--ink-mute);
}
.review-times {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--error);
  font-weight: 700;
  flex-shrink: 0;
}
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-mute);
  font-size: 13px;
}
.empty-state svg {
  width: 48px;
  height: 48px;
  margin: 0 auto 10px;
  stroke: var(--line);
  fill: none;
  stroke-width: 1.5;
}

/* === 完成屏 === */
.done-screen {
  text-align: center;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

<script>
/* practice-data.json 由原内联 <script id="data-script"> 拆出,以避免单文件过大 */
(function(){
  var s = document.createElement("script");
  s.id = "data-script";
  s.type = "application/json";
  document.currentScript.parentNode.insertBefore(s, document.currentScript);
  fetch("./practice-data.json")
    .then(function(r){ if(!r.ok) throw new Error("加载 practice-data.json 失败: "+r.status); return r.text(); })
    .then(function(t){
      s.textContent = t;
      window.dispatchEvent(new Event("practice-data-ready"));
    })
    .catch(function(e){ console.error(e); document.body.innerHTML = "<pre style=\"padding:24px;color:#c44536;font-family:monospace\">加载题库数据失败:\n"+e.message+"\n\n请确认 practice-data.json 与 practice.html 在同一目录,并通过本地服务器(如 python -m http.server)访问,而非直接双击打开。</pre>"; });
})();
</script>
<script>
/* ============ UI 组件英文练习 ============ */
var __practiceApp = function () {
  'use strict';

  // 数据从 <script id="data-script"> 读
  const RAW = JSON.parse(document.getElementById('data-script').textContent);
  // RAW 是 [{chapter:{num,en,zh}, zh, names:[{en,ipa}], desc, svg, tag, variants:[{zh,en,ipa,svg}]}]

  // ========== 题库构建 ==========
  // 主题 = 主组件 + (可选) 变体
  // q.kind: 'main' / 'variant'
  function buildQuestions() {
    const main = RAW.map(it => ({
      kind: 'main',
      chapter: it.chapter,
      zh: it.zh,
      names: it.names,        // 可能多个英文名
      desc: it.desc,
      svg: it.svg,
      tag: it.tag,
      // 用第一个英文名作为"主答案",其它作为"也对"
      answers: it.names.map(n => n.en),
    }));
    const variant = [];
    RAW.forEach(it => {
      it.variants.forEach(v => {
        variant.push({
          kind: 'variant',
          chapter: it.chapter,
          parentZh: it.zh,
          parentDesc: it.desc,
          zh: v.zh,
          names: [{ en: v.en, ipa: v.ipa }],
          svg: v.svg,
          desc: it.desc,  // 用父组件描述
          answers: [v.en],
        });
      });
    });
    return { main, variant };
  }
  const QBANK = buildQuestions();

  // 章节列表(去重)
  const CHAPTERS = (() => {
    const seen = new Map();
    RAW.forEach(it => {
      if (it.chapter && !seen.has(it.chapter.num)) {
        seen.set(it.chapter.num, it.chapter);
      }
    });
    return [...seen.values()].sort((a, b) => a.num - b.num);
  })();

  // ========== 状态(用户偏好 + 本次进度) ==========
  const STORE_KEY = 'ui_practice_v1';
  function loadStore() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }
    catch { return {}; }
  }
  function saveStore(s) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch {}
  }
  const store = Object.assign({
    chapters: ['all'],   // 章节筛选
    scope: 'both',       // 'main' | 'variant' | 'both'
    mode: 'choice',      // 'choice' | 'input'
    sessionLen: 20,      // 单次题数
    reviewBook: {},      // {key: {zh, en, ipa, svg, times}}
  }, loadStore());

  let session = null;     // 当前会话:{ pool, idx, correct, wrong, answeredKeys: Set, history: [] }
  let revealed = false;   // 当前题是否已揭晓(防多次提交)

  // ========== Utils ==========
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function sample(arr, n) { return shuffle(arr).slice(0, n); }
  function normalize(s) {
    return (s || '')
      .toLowerCase()
      .replace(/[\s\-_/]+/g, '')
      .replace(/[\.,'"!?:;()&]/g, '')
      .trim();
  }
  function checkAnswer(input, answers) {
    const t = normalize(input);
    return answers.some(a => normalize(a) === t);
  }
  function questionKey(q) {
    return `${q.kind}:${q.chapter ? q.chapter.num : '?'}:${q.zh}:${q.answers[0]}`;
  }

  // ========== 朗读 ==========
  let voicesCache = null;
  function loadVoices() {
    return new Promise(resolve => {
      const cur = window.speechSynthesis.getVoices();
      if (cur && cur.length) { voicesCache = cur; resolve(cur); return; }
      const t = setTimeout(() => { voicesCache = window.speechSynthesis.getVoices(); resolve(voicesCache); }, 600);
      window.speechSynthesis.onvoiceschanged = () => {
        clearTimeout(t);
        voicesCache = window.speechSynthesis.getVoices();
        resolve(voicesCache);
      };
    });
  }
  function pickVoice() {
    const list = voicesCache || window.speechSynthesis.getVoices() || [];
    if (!list.length) return null;
    const prefs = [
      v => /samantha/i.test(v.name),
      v => /^en[-_]US$/i.test(v.lang) && /google/i.test(v.name),
      v => /^en[-_]US$/i.test(v.lang) && /microsoft/i.test(v.name),
      v => /^en[-_]US$/i.test(v.lang),
      v => /^en/i.test(v.lang),
    ];
    for (const p of prefs) {
      const v = list.find(p);
      if (v) return v;
    }
    return list[0];
  }
  function speak(text, btn) {
    if (!('speechSynthesis' in window)) return;
    try { window.speechSynthesis.cancel(); } catch {}
    const cleaned = text.replace(/&/g, ' and ').replace(/\//g, ' ').replace(/\s+/g, ' ').trim();
    const u = new SpeechSynthesisUtterance(cleaned);
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 0.95;
    u.pitch = 1;
    u.volume = 1;
    u.lang = (v && v.lang) || 'en-US';
    if (btn) {
      btn.classList.add('playing');
      u.onend = () => btn.classList.remove('playing');
      u.onerror = () => btn.classList.remove('playing');
    }
    window.speechSynthesis.speak(u);
  }
  loadVoices();

  // ========== 触觉反馈(支持的设备) ==========
  function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
  }

  // ========== 题库 → 池 ==========
  function buildPool() {
    let pool = [];
    if (store.scope === 'main' || store.scope === 'both') pool = pool.concat(QBANK.main);
    if (store.scope === 'variant' || store.scope === 'both') pool = pool.concat(QBANK.variant);
    if (!store.chapters.includes('all')) {
      pool = pool.filter(q => q.chapter && store.chapters.includes(String(q.chapter.num)));
    }
    return pool;
  }
  function startSession() {
    const pool = buildPool();
    if (!pool.length) {
      toast('当前筛选下没有题目');
      return false;
    }
    const target = Math.min(store.sessionLen, pool.length);
    session = {
      pool: sample(pool, target),
      idx: 0,
      correct: 0,
      wrong: 0,
      history: [],   // {key, q, userAns, ok}
    };
    revealed = false;
    return true;
  }

  // 生成 4 选项(干扰项从同章/同 scope 随机)
  function buildChoices(q) {
    const correct = q.answers[0];
    const all = QBANK.main.concat(QBANK.variant)
      .filter(o => o !== q && o.answers[0] !== correct)
      .map(o => o.answers[0]);
    // 优先同章节
    let pool = all;
    if (q.chapter) {
      const same = all.filter(en => {
        const found = QBANK.main.concat(QBANK.variant).find(o => o.answers[0] === en);
        return found && found.chapter && found.chapter.num === q.chapter.num;
      });
      if (same.length >= 3) pool = same;
    }
    // 去重
    const seen = new Set([normalize(correct)]);
    const distinct = pool.filter(en => {
      const k = normalize(en);
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    });
    const distractors = sample(distinct, 3);
    return shuffle([correct, ...distractors]);
  }

  // ========== 渲染 ==========
  const $main = document.getElementById('main');
  const $progress = document.getElementById('progress');

  function setProgress(p) {
    $progress.style.setProperty('--progress', `${Math.max(0, Math.min(100, p))}%`);
  }

  function renderQuestion() {
    const q = session.pool[session.idx];
    const chapText = q.chapter ? `— ${String(q.chapter.num).padStart(2, '0')} / ${q.chapter.en}` : '';
    const tagHtml = q.tag ? `<span class="tag">${q.tag}</span>` : '';
    const scopeHtml = q.kind === 'variant'
      ? `<span class="scope"><span class="v-flag">●</span> 变体 · Variant</span>`
      : `<span class="scope">主组件 · Main</span>`;

    // 描述区:主组件 → 直接显示用途说明
    //         变体 → 父组件名 + 父组件用途说明(变体属于哪个组件类别)
    let descHTML = '';
    if (q.kind === 'main') {
      descHTML = q.desc ? `<div class="q-desc">${escapeHtml(q.desc)}</div>` : '';
    } else {
      const parentLabel = q.parentZh
        ? `<span class="parent-tag"><span class="parent-dot"></span>属于 <strong>${escapeHtml(q.parentZh)}</strong></span>`
        : '';
      const parentDesc = q.parentDesc
        ? `<div class="q-desc">${escapeHtml(q.parentDesc)}</div>`
        : '';
      descHTML = `${parentLabel}${parentDesc}`;
    }

    // 提示行:明确告诉用户在问什么
    const promptText = q.kind === 'variant'
      ? '这一变体的英文名是?'
      : '这个组件的英文名是?';

    const answerHTML = store.mode === 'choice'
      ? renderChoiceMode(q)
      : renderInputMode(q);

    $main.innerHTML = `
      <div class="card">
        <div class="q-meta">
          <span class="chapter">${chapText}</span>
          <span class="counter">${session.idx + 1} / ${session.pool.length}</span>
        </div>
        <div class="q-illust">${q.svg}</div>
        <div class="q-name">
          <span class="zh">${escapeHtml(q.zh)}</span>
          ${tagHtml || scopeHtml}
        </div>
        ${descHTML}
        <div class="q-prompt">${promptText}</div>
      </div>
      <div class="card answer-area">
        <div class="mode-tabs" id="mode-tabs">
          <button class="mode-tab ${store.mode === 'choice' ? 'active' : ''}" data-mode="choice">四选一 · Choose</button>
          <button class="mode-tab ${store.mode === 'input' ? 'active' : ''}" data-mode="input">输入 · Type</button>
        </div>
        <div id="answer-zone">${answerHTML}</div>
        <div id="feedback-zone"></div>
      </div>
    `;

    // 事件:模式切换
    document.getElementById('mode-tabs').addEventListener('click', (e) => {
      const t = e.target.closest('.mode-tab');
      if (!t || revealed) return;
      const m = t.dataset.mode;
      if (m === store.mode) return;
      store.mode = m;
      saveStore(store);
      // 重渲染答题区
      const $ans = document.getElementById('answer-zone');
      $ans.innerHTML = m === 'choice' ? renderChoiceMode(q) : renderInputMode(q);
      bindAnswerEvents(q);
      document.querySelectorAll('.mode-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.mode === m);
      });
    });

    bindAnswerEvents(q);

    setProgress((session.idx / session.pool.length) * 100);
  }

  function renderChoiceMode(q) {
    const choices = buildChoices(q);
    return `
      <div class="choice-mode" id="choice-grid">
        ${choices.map(c => `<button class="choice-btn" data-en="${escapeAttr(c)}">${escapeHtml(c)}</button>`).join('')}
      </div>
    `;
  }
  function renderInputMode(q) {
    return `
      <div class="input-mode">
        <div class="input-wrap" id="input-wrap">
          <input class="text-input" id="input-en" type="text" autocapitalize="off" autocomplete="off"
                 autocorrect="off" spellcheck="false" placeholder="Type the English name…" />
          <button class="submit-btn" id="submit-btn">
            <span>提交</span>
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    `;
  }

  function bindAnswerEvents(q) {
    if (store.mode === 'choice') {
      document.getElementById('choice-grid').addEventListener('click', (e) => {
        if (revealed) return;
        const b = e.target.closest('.choice-btn');
        if (!b) return;
        handleAnswer(q, b.dataset.en, b);
      });
    } else {
      const inp = document.getElementById('input-en');
      const sub = document.getElementById('submit-btn');
      const submit = () => {
        if (revealed) return;
        const v = (inp.value || '').trim();
        if (!v) return;
        handleAnswer(q, v, null);
      };
      sub.addEventListener('click', submit);
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
      });
      // 自动 focus
      setTimeout(() => inp.focus(), 50);
    }
  }

  function handleAnswer(q, userAns, choiceBtn) {
    if (revealed) return;
    revealed = true;
    const ok = checkAnswer(userAns, q.answers);
    if (ok) {
      session.correct++;
      vibrate(40);
    } else {
      session.wrong++;
      vibrate([30, 60, 30]);
      // 加入错题本
      const key = questionKey(q);
      const ent = store.reviewBook[key] || {
        zh: q.zh,
        en: q.answers[0],
        ipa: q.names[0] && q.names[0].ipa,
        svg: q.svg,
        chapter: q.chapter,
        kind: q.kind,
        parentZh: q.parentZh,
        times: 0,
      };
      ent.times++;
      ent.ipa = q.names[0] && q.names[0].ipa;
      store.reviewBook[key] = ent;
      saveStore(store);
    }
    session.history.push({ q, userAns, ok });

    // 视觉反馈
    if (store.mode === 'choice' && choiceBtn) {
      choiceBtn.classList.add(ok ? 'correct' : 'wrong');
      // 若答错,顺便高亮正确选项
      if (!ok) {
        document.querySelectorAll('.choice-btn').forEach(b => {
          b.disabled = true;
          if (normalize(b.dataset.en) === normalize(q.answers[0])) {
            b.classList.add('correct');
          }
        });
      } else {
        document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
      }
    } else {
      const wrap = document.getElementById('input-wrap');
      wrap.classList.add(ok ? 'correct' : 'wrong');
      document.getElementById('input-en').disabled = true;
      document.getElementById('submit-btn').disabled = true;
    }

    showFeedback(q, ok);
  }

  function showFeedback(q, ok) {
    const $fb = document.getElementById('feedback-zone');
    const primaryName = q.names[0];
    const otherNames = q.names.slice(1);

    const otherHtml = otherNames.length
      ? `<div class="fb-extra-names">
           <span style="font-family:var(--mono);font-size:10px;color:var(--ink-mute);letter-spacing:.08em;">还可叫:</span>
           ${otherNames.map(n => `
             <span class="name-chip">
               <span class="en">${escapeHtml(n.en)}</span>
               <span class="ipa">${escapeHtml(n.ipa || '')}</span>
               <button class="mini-speak" data-text="${escapeAttr(n.en)}" aria-label="朗读">
                 <svg viewBox="0 0 16 16"><path d="M8 2 L4 5.5 L1.5 5.5 L1.5 10.5 L4 10.5 L8 14 Z"/><path d="M11 5 Q13 8 11 11" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round"/></svg>
               </button>
             </span>
           `).join('')}
         </div>`
      : '';

    $fb.innerHTML = `
      <div class="feedback ${ok ? 'correct' : 'wrong'}">
        <div class="fb-title">
          <span class="fb-icon">${ok ? '✓' : '✗'}</span>
          <span>${ok ? '正确 · Correct' : '答错 · Try again'}</span>
        </div>
        <div class="fb-answer">
          <span class="ans-en">${escapeHtml(primaryName.en)}</span>
          <span class="ans-ipa">${escapeHtml(primaryName.ipa || '')}</span>
          <button class="speak-fb-btn" data-text="${escapeAttr(primaryName.en)}" aria-label="朗读">
            <svg viewBox="0 0 16 16"><path d="M8 2 L4 5.5 L1.5 5.5 L1.5 10.5 L4 10.5 L8 14 Z"/><path d="M11 5 Q13 8 11 11" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </div>
        ${otherHtml}
      </div>
      <button class="next-btn" id="next-btn">
        ${session.idx + 1 >= session.pool.length ? '查看结果' : '下一题'}
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    `;

    // 自动朗读答案
    setTimeout(() => {
      const mainBtn = $fb.querySelector('.speak-fb-btn');
      if (mainBtn) speak(primaryName.en, mainBtn);
    }, 250);

    // 朗读按钮
    $fb.addEventListener('click', (e) => {
      const sb = e.target.closest('.speak-fb-btn, .mini-speak');
      if (sb) {
        e.stopPropagation();
        speak(sb.dataset.text, sb);
      }
    });

    // 下一题
    document.getElementById('next-btn').addEventListener('click', nextQuestion);

    // 更新进度(算上当前题)
    setProgress(((session.idx + 1) / session.pool.length) * 100);
  }

  function nextQuestion() {
    session.idx++;
    revealed = false;
    if (session.idx >= session.pool.length) {
      renderDone();
    } else {
      renderQuestion();
    }
  }

  function renderDone() {
    const total = session.pool.length;
    const correct = session.correct;
    const acc = total ? Math.round((correct / total) * 100) : 0;
    let medal = '🎯', subtitle = 'Keep going!';
    if (acc === 100) { medal = '🏆'; subtitle = 'Perfect score!'; }
    else if (acc >= 90) { medal = '⭐'; subtitle = 'Excellent!'; }
    else if (acc >= 70) { medal = '👍'; subtitle = 'Well done!'; }
    else if (acc >= 50) { medal = '💪'; subtitle = 'Keep practicing!'; }
    else { medal = '📚'; subtitle = 'Time to review!'; }

    setProgress(100);
    $main.innerHTML = `
      <div class="card done-screen">
        <div class="done-medal">${medal}</div>
        <div class="done-title">本轮完成</div>
        <div class="done-subtitle">${subtitle}</div>
        <div class="done-stats">
          <div class="done-stat">
            <span class="num">${total}</span>
            <span class="label">题数</span>
          </div>
          <div class="done-stat">
            <span class="num success">${correct}</span>
            <span class="label">正确</span>
          </div>
          <div class="done-stat">
            <span class="num brand">${acc}%</span>
            <span class="label">正确率</span>
          </div>
        </div>
        <div class="done-actions">
          <button class="secondary" id="btn-done-settings">调整设置</button>
          <button class="primary" id="btn-done-again">再练一轮</button>
        </div>
      </div>
    `;
    document.getElementById('btn-done-again').addEventListener('click', () => {
      if (startSession()) renderQuestion();
    });
    document.getElementById('btn-done-settings').addEventListener('click', openSettings);
  }

  // ========== 设置弹层 ==========
  const $mask = document.getElementById('mask');
  const $sheet = document.getElementById('sheet');
  const $sheetTitle = document.getElementById('sheet-title');
  const $sheetSubtitle = document.getElementById('sheet-subtitle');
  const $sheetBody = document.getElementById('sheet-body');

  function openSheet() { $mask.classList.add('show'); $sheet.classList.add('show'); }
  function closeSheet() { $mask.classList.remove('show'); $sheet.classList.remove('show'); }
  $mask.addEventListener('click', closeSheet);

  function openSettings() {
    $sheetTitle.textContent = '练习设置';
    $sheetSubtitle.textContent = 'Practice settings';
    const chapsHtml = `
      <button class="chap-cell ${store.chapters.includes('all') ? 'active' : ''}" data-num="all">
        <span class="chap-num">★</span>
        <span class="chap-zh">全部 14 章</span>
      </button>
      ${CHAPTERS.map(c => `
        <button class="chap-cell ${store.chapters.includes(String(c.num)) ? 'active' : ''}" data-num="${c.num}">
          <span class="chap-num">${String(c.num).padStart(2, '0')}</span>
          <span class="chap-zh">${c.zh}</span>
        </button>
      `).join('')}
    `;

    $sheetBody.innerHTML = `
      <div class="opt-group">
        <div class="opt-group-title">范围 · Scope</div>
        <div class="opt-row" data-key="scope">
          <button class="opt-chip ${store.scope === 'main' ? 'active' : ''}" data-val="main">仅主组件</button>
          <button class="opt-chip ${store.scope === 'variant' ? 'active' : ''}" data-val="variant">仅变体</button>
          <button class="opt-chip ${store.scope === 'both' ? 'active' : ''}" data-val="both">主+变体</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-group-title">默认答题方式 · Mode</div>
        <div class="opt-row" data-key="mode">
          <button class="opt-chip ${store.mode === 'choice' ? 'active' : ''}" data-val="choice">四选一</button>
          <button class="opt-chip ${store.mode === 'input' ? 'active' : ''}" data-val="input">手动输入</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-group-title">本轮题数 · Session length</div>
        <div class="opt-row" data-key="sessionLen">
          ${[10, 20, 30, 50].map(n => `<button class="opt-chip ${store.sessionLen === n ? 'active' : ''}" data-val="${n}">${n} 题</button>`).join('')}
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-group-title">章节筛选 · Chapters</div>
        <div class="chap-grid" data-key="chapters">
          ${chapsHtml}
        </div>
      </div>
      <div class="sheet-action">
        <button class="secondary" id="cancel-settings">取消</button>
        <button class="primary" id="apply-settings">开始练习</button>
      </div>
    `;
    openSheet();

    // 事件
    $sheetBody.querySelectorAll('.opt-row').forEach(row => {
      row.addEventListener('click', (e) => {
        const c = e.target.closest('.opt-chip');
        if (!c) return;
        row.querySelectorAll('.opt-chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
      });
    });
    // 章节多选,但 'all' 互斥
    const chapGrid = $sheetBody.querySelector('.chap-grid');
    chapGrid.addEventListener('click', (e) => {
      const c = e.target.closest('.chap-cell');
      if (!c) return;
      const num = c.dataset.num;
      if (num === 'all') {
        chapGrid.querySelectorAll('.chap-cell').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
      } else {
        chapGrid.querySelector('.chap-cell[data-num="all"]').classList.remove('active');
        c.classList.toggle('active');
        // 若全无勾选,默认 all
        const anyActive = chapGrid.querySelector('.chap-cell.active');
        if (!anyActive) chapGrid.querySelector('.chap-cell[data-num="all"]').classList.add('active');
      }
    });

    document.getElementById('cancel-settings').addEventListener('click', closeSheet);
    document.getElementById('apply-settings').addEventListener('click', () => {
      // 收集
      const scope = $sheetBody.querySelector('[data-key="scope"] .opt-chip.active').dataset.val;
      const mode = $sheetBody.querySelector('[data-key="mode"] .opt-chip.active').dataset.val;
      const sessionLen = parseInt($sheetBody.querySelector('[data-key="sessionLen"] .opt-chip.active').dataset.val, 10);
      const activeChaps = [...chapGrid.querySelectorAll('.chap-cell.active')].map(x => x.dataset.num);
      const chapters = activeChaps.includes('all') ? ['all'] : activeChaps;
      Object.assign(store, { scope, mode, sessionLen, chapters });
      saveStore(store);
      closeSheet();
      if (startSession()) renderQuestion();
    });
  }

  function openReview() {
    $sheetTitle.textContent = '错题本';
    $sheetSubtitle.textContent = `Mistakes review · ${Object.keys(store.reviewBook).length} 项`;
    const items = Object.entries(store.reviewBook)
      .map(([key, e]) => ({ key, ...e }))
      .sort((a, b) => b.times - a.times);

    if (!items.length) {
      $sheetBody.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 0 0 1.946-.806 3.42 3.42 0 0 1 4.438 0 3.42 3.42 0 0 0 1.946.806 3.42 3.42 0 0 1 3.138 3.138 3.42 3.42 0 0 0 .806 1.946 3.42 3.42 0 0 1 0 4.438 3.42 3.42 0 0 0-.806 1.946 3.42 3.42 0 0 1-3.138 3.138 3.42 3.42 0 0 0-1.946.806 3.42 3.42 0 0 1-4.438 0 3.42 3.42 0 0 0-1.946-.806 3.42 3.42 0 0 1-3.138-3.138 3.42 3.42 0 0 0-.806-1.946 3.42 3.42 0 0 1 0-4.438 3.42 3.42 0 0 0 .806-1.946 3.42 3.42 0 0 1 3.138-3.138z"/></svg>
          <div>还没有错题<br>继续练习吧!</div>
        </div>
        <div class="sheet-action">
          <button class="primary" id="review-close">关闭</button>
        </div>
      `;
      document.getElementById('review-close').addEventListener('click', closeSheet);
    } else {
      $sheetBody.innerHTML = `
        <div class="review-list" id="review-list">
          ${items.map(it => `
            <div class="review-item">
              <div class="review-svg">${it.svg}</div>
              <div class="review-text">
                <span class="zh">${escapeHtml(it.zh)}</span>
                <span class="en">${escapeHtml(it.en)}</span>
                <span class="ipa">${escapeHtml(it.ipa || '')}</span>
              </div>
              <button class="icon-btn" data-text="${escapeAttr(it.en)}" aria-label="朗读" style="width:32px;height:32px;color:var(--brand);">
                <svg viewBox="0 0 16 16" style="stroke:none;fill:currentColor;width:14px;height:14px;"><path d="M8 2 L4 5.5 L1.5 5.5 L1.5 10.5 L4 10.5 L8 14 Z"/><path d="M11 5 Q13 8 11 11" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round"/></svg>
              </button>
              <span class="review-times">×${it.times}</span>
            </div>
          `).join('')}
        </div>
        <div class="sheet-action">
          <button class="secondary" id="review-clear">清空</button>
          <button class="primary" id="review-practice">仅练错题</button>
        </div>
      `;
      $sheetBody.querySelector('#review-list').addEventListener('click', (e) => {
        const sb = e.target.closest('.icon-btn');
        if (sb) speak(sb.dataset.text, sb);
      });
      document.getElementById('review-clear').addEventListener('click', () => {
        if (confirm('确定清空错题本?')) {
          store.reviewBook = {};
          saveStore(store);
          openReview();
        }
      });
      document.getElementById('review-practice').addEventListener('click', () => {
        // 用错题本里的项目作为本轮 pool
        const pool = items.map(it => {
          // 重建 q
          const found = QBANK.main.concat(QBANK.variant).find(q => questionKey(q) === it.key);
          return found || null;
        }).filter(Boolean);
        if (!pool.length) {
          toast('错题本数据已失效');
          return;
        }
        session = { pool: shuffle(pool), idx: 0, correct: 0, wrong: 0, history: [] };
        revealed = false;
        closeSheet();
        renderQuestion();
      });
    }
    openSheet();
  }

  // ========== 字典模式 ==========
  // 维持字典查询状态(在切回练习时不丢失)
  const dictState = {
    keyword: '',
    chapter: 'all',
    expanded: new Set(),  // 展开的组件 key
    scrollY: 0,
  };

  // 当前视图:'practice' | 'dict'
  let currentView = 'practice';

  function dictKey(it) {
    return `${it.chapter ? it.chapter.num : '?'}:${it.zh}:${it.names[0] && it.names[0].en}`;
  }

  function filterDict() {
    let list = RAW.slice();
    if (dictState.chapter !== 'all') {
      list = list.filter(it => it.chapter && String(it.chapter.num) === dictState.chapter);
    }
    const kw = dictState.keyword.trim().toLowerCase();
    if (kw) {
      const nkw = normalize(kw);
      list = list.filter(it => {
        // 中文名
        if (it.zh && it.zh.toLowerCase().includes(kw)) return true;
        // 英文主名
        if (it.names.some(n => n.en && n.en.toLowerCase().includes(kw))) return true;
        if (it.names.some(n => normalize(n.en).includes(nkw))) return true;
        // 描述
        if (it.desc && it.desc.toLowerCase().includes(kw)) return true;
        // 变体名(中英)
        if (it.variants.some(v => (v.zh && v.zh.includes(kw))
          || (v.en && (v.en.toLowerCase().includes(kw) || normalize(v.en).includes(nkw))))) return true;
        return false;
      });
    }
    return list;
  }

  // 章节面板默认展开状态(放在状态对象,切回还在原位)
  if (typeof dictState.chapPanelOpen === 'undefined') dictState.chapPanelOpen = false;

  function renderDict() {
    const filtered = filterDict();
    // 当前选中章节信息
    const curNum = dictState.chapter;
    let curLabel = '全部 14 章';
    let curCount = RAW.length;
    if (curNum !== 'all') {
      const c = CHAPTERS.find(x => String(x.num) === curNum);
      if (c) {
        curLabel = `${String(c.num).padStart(2,'0')} · ${c.zh}`;
        curCount = RAW.filter(it => it.chapter && String(it.chapter.num) === curNum).length;
      }
    }
    // 章节网格(展开时显示)
    const chapPanelHTML = `
      <button class="dict-chap-opt all ${curNum === 'all' ? 'active' : ''}" data-num="all">
        <span class="opt-num">★</span>
        <span class="opt-zh">全部组件</span>
        <span class="opt-cnt">${RAW.length} 项</span>
      </button>
      ${CHAPTERS.map(c => {
        const cnt = RAW.filter(it => it.chapter && it.chapter.num === c.num).length;
        return `<button class="dict-chap-opt ${curNum === String(c.num) ? 'active' : ''}" data-num="${c.num}">
          <span class="opt-num">${String(c.num).padStart(2,'0')}</span>
          <span class="opt-zh">${escapeHtml(c.zh)}</span>
          <span class="opt-cnt">${cnt}</span>
        </button>`;
      }).join('')}
    `;

    const listHTML = filtered.length
      ? `<div class="dict-list">${filtered.map(it => renderDictItem(it)).join('')}</div>`
      : `<div class="dict-empty">
           <div class="em-zh">未找到匹配组件</div>
           <div class="em-en">No matching components</div>
         </div>`;

    $main.innerHTML = `
      <div class="dict-search">
        <div class="dict-search-wrap">
          <span class="dict-search-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <input class="dict-search-input" id="dict-input" type="text"
                 placeholder="搜索组件 / 英文 / 中文 / 用途…"
                 value="${escapeAttr(dictState.keyword)}"
                 autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" />
          <button class="dict-search-clear ${dictState.keyword ? 'show' : ''}" id="dict-clear" aria-label="清除">×</button>
        </div>
        <div class="dict-chap-picker ${dictState.chapPanelOpen ? 'open' : ''}" id="chap-picker">
          <button class="dict-chap-summary" id="chap-toggle">
            <span class="dict-chap-icon">
              <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            </span>
            <span class="dict-chap-current">
              <span class="label">分类</span>
              <span class="value">${escapeHtml(curLabel)}</span>
            </span>
            <span class="count">${curCount} 项</span>
            <span class="dict-chap-toggle-arrow">
              <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </span>
          </button>
          <div class="dict-chap-panel">
            <div class="dict-chap-grid" id="chap-grid">${chapPanelHTML}</div>
          </div>
        </div>
        <div class="dict-meta">${filtered.length} / ${RAW.length} 项 · ${dictState.keyword ? '搜索:'+escapeHtml(dictState.keyword) : '全部展示'}</div>
      </div>
      ${listHTML}
    `;

    // 进度条隐藏
    setProgress(0);

    // 输入事件
    const $input = document.getElementById('dict-input');
    const $clear = document.getElementById('dict-clear');
    let inputT = null;
    $input.addEventListener('input', (e) => {
      clearTimeout(inputT);
      inputT = setTimeout(() => {
        dictState.keyword = e.target.value;
        renderDict();
        setTimeout(() => {
          const ni = document.getElementById('dict-input');
          if (ni) {
            ni.focus();
            ni.setSelectionRange(ni.value.length, ni.value.length);
          }
        }, 0);
      }, 180);
    });
    $clear.addEventListener('click', () => {
      dictState.keyword = '';
      renderDict();
      setTimeout(() => document.getElementById('dict-input').focus(), 0);
    });

    // 章节折叠展开
    document.getElementById('chap-toggle').addEventListener('click', () => {
      dictState.chapPanelOpen = !dictState.chapPanelOpen;
      const picker = document.getElementById('chap-picker');
      picker.classList.toggle('open', dictState.chapPanelOpen);
    });

    // 章节选项
    document.getElementById('chap-grid').addEventListener('click', (e) => {
      const opt = e.target.closest('.dict-chap-opt');
      if (!opt) return;
      dictState.chapter = opt.dataset.num;
      // 选中后自动收起
      dictState.chapPanelOpen = false;
      renderDict();
      // 滚回顶,方便从筛选结果开始浏览
      window.scrollTo(0, 0);
    });

    // 恢复滚动位置
    if (dictState.scrollY) {
      requestAnimationFrame(() => window.scrollTo(0, dictState.scrollY));
    }
  }

  function handleDictClick(e) {
    if (currentView !== 'dict') return;
    // 朗读按钮(优先级最高)
    const speak = e.target.closest('.speak-d, .v-speak');
    if (speak) {
      e.stopPropagation();
      speak.classList.add('playing');
      speakText(speak.dataset.text, speak);
      return;
    }
    // 展开/折叠
    const head = e.target.closest('.dict-item-head');
    if (!head) return;
    const item = head.closest('.dict-item');
    const key = item.dataset.key;
    if (item.classList.contains('expanded')) {
      item.classList.remove('expanded');
      dictState.expanded.delete(key);
    } else {
      item.classList.add('expanded');
      dictState.expanded.add(key);
    }
  }
  // 一次性绑定到 body 委托
  document.body.addEventListener('click', handleDictClick);
  // 直接调用 speak,避免 hoisting 问题
  function speakText(text, btn) { speak(text, btn); }

  function renderDictItem(it) {
    const key = dictKey(it);
    const expanded = dictState.expanded.has(key);
    const primary = it.names[0] || { en: '', ipa: '' };
    const chapText = it.chapter ? `${String(it.chapter.num).padStart(2,'0')} · ${it.chapter.en}` : '';
    const tag = it.tag ? `<span class="dict-item-meta" style="background:var(--ink);color:#fff;padding:1px 5px;border-radius:3px;">${escapeHtml(it.tag)}</span>` : '';

    const namesHTML = it.names.map(n => `
      <div class="dict-name-row">
        <span class="en">${escapeHtml(n.en)}</span>
        <span class="ipa">${escapeHtml(n.ipa || '')}</span>
        <button class="speak-d" data-text="${escapeAttr(n.en)}" aria-label="朗读 ${escapeAttr(n.en)}">
          <svg viewBox="0 0 16 16"><path d="M8 2 L4 5.5 L1.5 5.5 L1.5 10.5 L4 10.5 L8 14 Z"/><path d="M11 5 Q13 8 11 11" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    `).join('');

    const variantsHTML = it.variants && it.variants.length ? `
      <div class="dict-section-title">变体 · Variants (${it.variants.length})</div>
      <div class="dict-variants-grid">
        ${it.variants.map(v => `
          <div class="dict-variant-card">
            <div class="dict-variant-svg">${v.svg}</div>
            <div class="dict-variant-info">
              <span class="vzh">${escapeHtml(v.zh)}</span>
              <span class="ven-row">
                <span class="ven">${escapeHtml(v.en)}</span>
                <button class="v-speak" data-text="${escapeAttr(v.en)}" aria-label="朗读 ${escapeAttr(v.en)}">
                  <svg viewBox="0 0 16 16"><path d="M8 2 L4 5.5 L1.5 5.5 L1.5 10.5 L4 10.5 L8 14 Z"/><path d="M11 5 Q13 8 11 11" stroke="currentColor" fill="none" stroke-width="1.2" stroke-linecap="round"/></svg>
                </button>
              </span>
              <span class="vipa">${escapeHtml(v.ipa || '')}</span>
            </div>
          </div>
        `).join('')}
      </div>
    ` : '';

    return `
      <div class="dict-item ${expanded ? 'expanded' : ''}" data-key="${escapeAttr(key)}">
        <div class="dict-item-head">
          <div class="dict-item-svg">${it.svg}</div>
          <div class="dict-item-info">
            <div class="dict-item-zh-row">
              <span class="dict-item-zh">${escapeHtml(it.zh)}</span>
              <span class="dict-item-meta">${chapText}</span>
              ${tag}
            </div>
            <div class="dict-item-en">
              ${escapeHtml(primary.en)}<span class="dict-item-ipa">${escapeHtml(primary.ipa || '')}</span>
            </div>
          </div>
          <span class="dict-item-arrow">
            <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
          </span>
        </div>
        <div class="dict-item-body">
          <div class="dict-big-illust">${it.svg}</div>
          ${it.desc ? `<div class="dict-section-title">用途说明 · Description</div>
                       <div class="dict-desc-text">${escapeHtml(it.desc)}</div>` : ''}
          <div class="dict-section-title">英文名 · English Name${it.names.length > 1 ? 's' : ''}</div>
          <div class="dict-names">${namesHTML}</div>
          ${variantsHTML}
        </div>
      </div>
    `;
  }

  // ========== 视图切换 ==========
  function switchView(v) {
    if (currentView === v) return;
    // 保存当前视图状态
    if (currentView === 'dict') {
      dictState.scrollY = window.scrollY;
    }
    currentView = v;
    // 更新 tab 高亮
    document.querySelectorAll('.view-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === v);
    });
    // 渲染对应视图
    if (v === 'practice') {
      // 如果还没有 session 或已结束,启动新的
      if (!session || revealed && session.idx >= session.pool.length) {
        if (!startSession()) {
          $main.innerHTML = `<div class="card"><div class="empty-state"><div>题库为空</div></div></div>`;
          return;
        }
      }
      window.scrollTo(0, 0);
      // 重新渲染当前题(因为 main 之前被字典占用了)
      if (session.idx < session.pool.length) {
        if (revealed) {
          // 已答揭晓:重新走一遍渲染再 showFeedback
          const cur = session.pool[session.idx];
          revealed = false;
          renderQuestion();
          // 用历史里最近一条,模拟显示揭晓状态
          const last = session.history[session.history.length - 1];
          if (last && last.q === cur) {
            revealed = true;
            // 找到对应按钮(若 choice)
            if (store.mode === 'choice') {
              const btn = document.querySelector(`.choice-btn[data-en="${cssEscape(last.userAns)}"]`);
              if (btn) {
                btn.classList.add(last.ok ? 'correct' : 'wrong');
                if (!last.ok) {
                  document.querySelectorAll('.choice-btn').forEach(b => {
                    b.disabled = true;
                    if (normalize(b.dataset.en) === normalize(cur.answers[0])) b.classList.add('correct');
                  });
                } else {
                  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
                }
              }
            } else {
              const wrap = document.getElementById('input-wrap');
              if (wrap) wrap.classList.add(last.ok ? 'correct' : 'wrong');
              const inp = document.getElementById('input-en');
              const sb = document.getElementById('submit-btn');
              if (inp) { inp.disabled = true; inp.value = last.userAns; }
              if (sb) sb.disabled = true;
            }
            showFeedback(cur, last.ok);
          }
        } else {
          renderQuestion();
        }
      }
    } else {
      window.scrollTo(0, 0);
      renderDict();
    }
  }

  function cssEscape(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/[^\w-]/g, '\\$&');
  }

  // ========== Toast ==========
  let toastT = null;
  function toast(msg) {
    const $t = document.getElementById('toast');
    $t.textContent = msg;
    $t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => $t.classList.remove('show'), 1800);
  }

  // ========== Helpers ==========
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escapeAttr(s) { return escapeHtml(s); }

  // ========== 启动 ==========
  document.getElementById('btn-settings').addEventListener('click', openSettings);
  document.getElementById('btn-review').addEventListener('click', openReview);

  // 视图切换 tab
  document.getElementById('view-switch').addEventListener('click', (e) => {
    const t = e.target.closest('.view-tab');
    if (!t) return;
    switchView(t.dataset.view);
  });

  if (startSession()) {
    renderQuestion();
  } else {
    $main.innerHTML = `<div class="card"><div class="empty-state"><div>题库为空</div></div></div>`;
  }

})();

</script>

<script>
(function(){
  var btn = document.getElementById('btn-back-app');
  if(btn){
    btn.onclick = function(){window.location.replace('index.html#learn');};
  }
};
// 数据可能已就绪(同步内联)或需等待 fetch 完成
if (document.getElementById('data-script') && document.getElementById('data-script').textContent.trim()) {
  __practiceApp();
} else {
  window.addEventListener('practice-data-ready', __practiceApp);
}
</script>
