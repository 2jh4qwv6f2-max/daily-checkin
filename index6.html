<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>每日打卡汇报</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.7/dexie.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}

/* ===== Header ===== */
.hdr{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(102,126,234,.3)}
.hdr-in{max-width:500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.dt-row{display:flex;gap:6px;align-items:center}
.dt-row input{background:rgba(255,255,255,.2);border:none;border-radius:8px;color:#fff;font-size:12px;padding:4px 8px;outline:none}
.dt-row input[type="date"]{width:120px}
.dt-row input[type="time"]{width:80px}
.dt-row input::-webkit-calendar-picker-indicator{filter:invert(1)}

/* ===== Nav Tabs ===== */
.tabs{display:flex;max-width:500px;margin:0 auto;padding:8px 16px 0;gap:4px}
.tbtn{flex:1;padding:10px 0;border:none;background:#fff;border-radius:12px 12px 0 0;font-size:14px;font-weight:600;color:#888;cursor:pointer;transition:all .2s;position:relative}
.tbtn.active{color:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.tbtn.am.active{background:linear-gradient(135deg,#f6d365,#fda085)}
.tbtn.pm.active{background:linear-gradient(135deg,#a8edea,#fed6e3)}
.tbtn.em.active{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
.tbtn.ht.active{background:linear-gradient(135deg,#4facfe,#00f2fe)}

/* ===== Progress ===== */
.prog{max-width:500px;margin:0 auto;background:#fff;padding:12px 16px 8px}
.pbar{height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:width .4s ease;width:0}
.ptx{font-size:12px;color:#999;margin-top:4px;text-align:right}

/* ===== Content Wrap ===== */
.wrap{max-width:500px;margin:0 auto;background:#fff;padding:0 16px 16px;min-height:60vh}
.pnl{display:none}
.pnl.vis{display:block}

/* ===== Section Header ===== */
.shd{display:flex;align-items:center;gap:10px;padding:16px 0 12px;border-bottom:1px solid #f0f0f0;margin-bottom:12px}
.sico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.sico-m{background:linear-gradient(135deg,#fff3e0,#ffe0b2)}
.sico-n{background:linear-gradient(135deg,#e0f7fa,#b2ebf2)}
.sico-e{background:linear-gradient(135deg,#ede7f6,#d1c4e9)}
.stt{font-size:18px;font-weight:700;color:#1a1a2e}

/* ===== Checklist Items ===== */
.stk{display:flex;flex-direction:column;gap:2px}
.stk input[type="checkbox"]{display:none}
.rw{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:background .15s}
.rw:active{background:#f5f5ff}
.bx{width:22px;height:22px;border:2px solid #d0d0d0;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.bx svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .2s}
input[type="checkbox"]:checked + .rw .bx{background:#667eea;border-color:#667eea}
input[type="checkbox"]:checked + .rw .bx svg{opacity:1}
input[type="checkbox"]:checked + .rw{background:#f5f5ff}
input[type="checkbox"]:checked + .rw .tx{color:#667eea}
.tx{font-size:15px;color:#444}

/* ===== Compact Checkboxes (2-col) ===== */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:4px 0}
.cw{cursor:pointer}
.cw input[type="checkbox"]{display:none}
.cf{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;transition:background .15s}
.cf:active{background:#f5f5ff}
.cm{width:20px;height:20px;border:2px solid #d0d0d0;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.cm svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transition:opacity .2s}
.cw input:checked + .cf .cm{background:#667eea;border-color:#667eea}
.cw input:checked + .cf .cm svg{opacity:1}
.cw input:checked + .cf{background:#f5f5ff}
.cw input:checked + .cf .ct{color:#667eea}
.ct{font-size:14px;color:#444}
.cg2 .cf{padding:8px 10px}
.cg2 .ct{font-size:13px}

/* ===== Time / Food / Price Inputs ===== */
.ic{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f8f8fc;border-radius:10px;margin:6px 0}
.il{font-size:14px;color:#555;white-space:nowrap}
.ir{margin-left:auto}
.fd{flex:1;border:none;background:transparent;font-size:14px;color:#333;outline:none;text-align:right;min-width:0}
.fd:focus{color:#667eea}
.fd::placeholder{color:#bbb}
.pw{display:flex;align-items:center;background:#f0f0f8;border-radius:8px;padding:2px 8px;margin-left:auto;transition:all .2s;min-width:80px}
.pw:focus-within{background:#e8e8ff;box-shadow:0 0 0 2px rgba(102,126,234,.2)}
.pw input{border:none;background:transparent;width:50px;font-size:14px;text-align:right;outline:none;color:#333;-moz-appearance:textfield}
.pw input::-webkit-inner-spin-button,.pw input::-webkit-outer-spin-button{-webkit-appearance:none}
.pw input::placeholder{color:#bbb}
.pu{font-size:12px;color:#999;margin-left:2px;transition:color .2s}
.pw.hv .pu{color:#667eea}

/* ===== Time Field ===== */
.tfd{border:none;background:#f0f0f8;border-radius:8px;padding:6px 10px;font-size:14px;color:#333;outline:none;margin-left:auto;width:100px;text-align:center;transition:all .2s}
.tfd:focus{background:#e8e8ff;box-shadow:0 0 0 2px rgba(102,126,234,.2)}

/* ===== Bottom Buttons ===== */
.bot{max-width:500px;margin:0 auto;padding:12px 16px 32px;background:#fff}
.bi{display:flex;gap:8px}
.bn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.bs{background:#f5f5f5;color:#999}.bs:active{background:#eee}
.bp{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 4px 12px rgba(102,126,234,.3)}.bp:active{transform:scale(.98)}
.bh{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;box-shadow:0 4px 12px rgba(79,172,254,.3)}.bh:active{transform:scale(.98)}

/* ===== Toast ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ===== Screenshot Preview Modal ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:16px;max-width:90vw;max-height:90vh;overflow:auto;position:relative}
.modal-content img{max-width:100%;border-radius:8px}
.modal-close{position:absolute;top:8px;right:8px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(0,0,0,.5);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ===== History Panel ===== */
.hist-panel{display:none}
.hist-panel.vis{display:block}

.hist-filter{display:flex;gap:6px;padding:12px 0;flex-wrap:wrap;align-items:center}
.hist-filter select,.hist-filter input{border:1px solid #e0e0e0;border-radius:8px;padding:6px 10px;font-size:13px;color:#333;background:#fff;outline:none}
.hist-filter select:focus,.hist-filter input:focus{border-color:#667eea;box-shadow:0 0 0 2px rgba(102,126,234,.15)}
.hist-filter input[type="date"]{width:130px}
.hist-filter input[type="week"]{width:150px}
.hist-filter input[type="month"]{width:140px}

.filter-btn{border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer}
.filter-btn:active{transform:scale(.97)}

/* ===== History Cards ===== */
.hist-list{display:flex;flex-direction:column;gap:10px;padding-bottom:16px}
.hist-empty{text-align:center;padding:40px 0;color:#bbb;font-size:14px}
.hist-card{background:#f8f8fc;border-radius:12px;padding:14px;border:1px solid #ececf4}
.hist-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hist-card-date{font-size:15px;font-weight:700;color:#1a1a2e}
.hist-card-pct{font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px}
.pct-high{background:#e8f5e9;color:#2e7d32}
.pct-mid{background:#fff3e0;color:#e65100}
.pct-low{background:#fce4ec;color:#c62828}
.hist-card-body{display:flex;flex-wrap:wrap;gap:6px}
.hist-tag{font-size:12px;padding:3px 8px;border-radius:6px;background:#e8e8ff;color:#667eea}
.hist-tag.undone{background:#f5f5f5;color:#bbb;text-decoration:line-through}
.hist-meals{margin-top:8px;font-size:12px;color:#888;display:flex;gap:12px;flex-wrap:wrap}
.hist-time{margin-top:6px;font-size:12px;color:#999;display:flex;gap:12px}

/* ===== Report Stats ===== */
.report-section{margin-top:16px}
.report-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:#f8f8fc;border-radius:10px;padding:12px;text-align:center;border:1px solid #ececf4}
.stat-val{font-size:24px;font-weight:700;color:#667eea}
.stat-label{font-size:11px;color:#999;margin-top:2px}
.stat-card.highlight{background:linear-gradient(135deg,#667eea,#764ba2);border:none}
.stat-card.highlight .stat-val,.stat-card.highlight .stat-label{color:#fff}

/* ===== Chart ===== */
.chart-wrap{background:#f8f8fc;border-radius:12px;padding:14px;border:1px solid #ececf4;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:600;color:#555;margin-bottom:10px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;min-width:16px;max-width:40px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#667eea,#764ba2);transition:height .4s ease;min-height:2px}
.bar-label{font-size:9px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40px}
.bar-val{font-size:9px;color:#667eea;font-weight:600}

/* ===== Heatmap ===== */
.heatmap-wrap{display:flex;flex-wrap:wrap;gap:3px}
.hm-cell{width:14px;height:14px;border-radius:3px;background:#eee}
.hm-0{background:#ebedf0}.hm-1{background:#c6dbef}.hm-2{background:#9ecae1}.hm-3{background:#6baed6}.hm-4{background:#3182bd}.hm-5{background:#08519c}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;color:#999}

/* ===== Delete button in history cards ===== */
.hist-del{border:none;background:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px}
.hist-del:hover{background:#fee;color:#e53e3e}

@media(max-width:380px){
  .dt-row input[type="date"]{width:105px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Screenshot Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-content">
    <button class="modal-close" id="modalClose">&times;</button>
    <img id="previewImg" src="">
  </div>
</div>

<!-- Header -->
<div class="hdr" id="hdrArea">
  <div class="hdr-in">
    <span class="logo">每日打卡</span>
    <div class="dt-row">
      <input type="date" id="pD">
      <input type="time" id="pT" step="60">
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabsBar">
  <button class="tbtn am active" id="t0" type="button">🌅 早上</button>
  <button class="tbtn pm" id="t1" type="button">🌞 中午</button>
  <button class="tbtn em" id="t2" type="button">🌙 晚上</button>
  <button class="tbtn ht" id="t3" type="button">📊 历史</button>
</div>

<!-- Progress -->
<div class="prog" id="progArea">
  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div class="ptx" id="pt">已完成 0/20 项　0%</div>
</div>

<!-- Main Content -->
<div class="wrap" id="mainWrap">

  <!-- Panel 0: Morning -->
  <div class="pnl vis" id="s0">
    <div class="shd"><div class="sico sico-m">🌅</div><div class="stt">早上</div></div>
    <div class="stk">
      <div class="ic">
        <div class="il">⏰ 起床时间</div>
        <input type="time" id="wakeTime" step="60" class="tfd">
      </div>
      <div class="cg">
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">刷牙</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">洗脸</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">洗头</span></div></label>
      </div>
      <div class="cg cg2">
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">脸部擦药</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">手部擦药</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">换干净衣服</span></div></label>
      </div>
      <div class="cg cg2">
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">整理发型</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">整理衣服</span></div></label>
      </div>
      <div class="ic">
        <div class="il">🍳 早餐</div>
        <div class="pw"><input type="number" id="breakfastPrice" placeholder="0" min="0"><span class="pu">元</span></div>
      </div>
      <div class="ic" style="margin-top:-2px">
        <input type="text" id="breakfastFood" class="fd" placeholder="吃了什么...">
      </div>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">餐后漱口</span></div></label>
    </div>
  </div>

  <!-- Panel 1: Noon -->
  <div class="pnl" id="s1">
    <div class="shd"><div class="sico sico-n">🌞</div><div class="stt">中午</div></div>
    <div class="stk">
      <div class="ic">
        <div class="il">🍜 午餐</div>
        <div class="pw"><input type="number" id="lunchPrice" placeholder="0" min="0"><span class="pu">元</span></div>
      </div>
      <div class="ic" style="margin-top:-2px">
        <input type="text" id="lunchFood" class="fd" placeholder="吃了什么...">
      </div>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">餐后漱口</span></div></label>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">午休</span></div></label>
      <div class="cg cg2">
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">整理发型</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">整理衣服</span></div></label>
      </div>
    </div>
  </div>

  <!-- Panel 2: Evening -->
  <div class="pnl" id="s2">
    <div class="shd"><div class="sico sico-e">🌙</div><div class="stt">晚上</div></div>
    <div class="stk">
      <div class="ic">
        <div class="il">🍲 晚餐</div>
        <div class="pw"><input type="number" id="dinnerPrice" placeholder="0" min="0"><span class="pu">元</span></div>
      </div>
      <div class="ic" style="margin-top:-2px">
        <input type="text" id="dinnerFood" class="fd" placeholder="吃了什么...">
      </div>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">餐后漱口</span></div></label>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">洗澡</span></div></label>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">洗头</span></div></label>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">洗脚</span></div></label>
      <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">睡前刷牙</span></div></label>
      <div class="cg cg2">
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">脸部擦药</span></div></label>
        <label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">手部擦药</span></div></label>
      </div>
      <div class="ic">
        <div class="il">😴 睡觉时间</div>
        <input type="time" id="sleepTime" step="60" class="tfd">
      </div>
    </div>
  </div>

  <!-- Panel 3: History -->
  <div class="pnl" id="s3">
    <div class="shd"><div class="sico" style="background:linear-gradient(135deg,#e3f2fd,#bbdefb)">📊</div><div class="stt">历史记录</div></div>

    <div class="hist-filter" id="histFilter">
      <select id="histMode">
        <option value="day">按天</option>
        <option value="week">按周</option>
        <option value="month">按月</option>
        <option value="quarter">按季</option>
        <option value="year">按年</option>
      </select>
      <div id="filterInputs">
        <input type="date" id="filterDay" value="">
      </div>
      <button class="filter-btn" id="filterBtn">查询</button>
    </div>

    <div id="histContent">
      <div class="hist-empty">暂无打卡记录</div>
    </div>
  </div>

</div>

<!-- Bottom Buttons -->
<div class="bot" id="botArea">
  <div class="bi">
    <button class="bn bs" id="btnR" type="button">↺ 重置</button>
    <button class="bn bh" id="btnH" type="button">💾 保存记录</button>
    <button class="bn bp" id="btnS" type="button">📸 截图</button>
  </div>
</div>

<script>
(function(){
  // ===== Utilities =====
  function pad(n){return n<10?'0'+n:''+n}
  function ge(id){return document.getElementById(id)}
  function getCurDT(){
    var d=new Date();
    return {date:d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()),
            time:pad(d.getHours())+':'+pad(d.getMinutes())}
  }

  // ===== IndexedDB with Dexie =====
  var db = new Dexie('DailyCheckinDB');
  db.version(1).stores({
    records: 'date, timestamp'
  });

  // ===== Init Date/Time =====
  var dt=getCurDT();
  ge('pD').value=dt.date;
  ge('pT').value=dt.time;

  // ===== Time Picker Defaults =====
  // Set default wake time to 07:00
  var wakeEl = ge('wakeTime');
  wakeEl.value = '07:00';
  wakeEl.addEventListener('focus', function(){
    if(!this.value) this.value = '07:00';
  });

  // Set default sleep time to 22:00
  var sleepEl = ge('sleepTime');
  sleepEl.value = '22:00';
  sleepEl.addEventListener('focus', function(){
    if(!this.value) this.value = '22:00';
  });

  // ===== Tab Switching =====
  var curTab=0;
  var tabClasses=['am','pm','em','ht'];
  function doTab(i){
    curTab=i;
    for(var t=0;t<4;t++){
      ge('t'+t).classList.remove('active');
      ge('t'+t).className='tbtn '+tabClasses[t]+(t===i?' active':'');
    }
    for(var p=0;p<4;p++){
      ge('s'+p).classList.remove('vis');
    }
    ge('s'+i).classList.add('vis');
    // Show/hide progress & bottom based on tab
    if(i===3){
      ge('progArea').style.display='none';
      ge('botArea').style.display='none';
      loadHistory();
    } else {
      ge('progArea').style.display='';
      ge('botArea').style.display='';
    }
  }
  for(var t=0;t<4;t++){
    (function(idx){
      ge('t'+idx).addEventListener('click',function(){doTab(idx)});
    })(t);
  }

  // ===== Checkbox Labels (for saving) =====
  var allCheckboxLabels = [];
  var allChks = document.querySelectorAll('.chk');
  allChks.forEach(function(chk){
    var label = '';
    var parent = chk.parentElement;
    var txEl = parent.querySelector('.tx') || parent.querySelector('.ct');
    if(txEl) label = txEl.textContent.trim();
    allCheckboxLabels.push(label);
  });

  // ===== Progress =====
  function updP(){
    var chks=document.querySelectorAll('.chk');
    var total=chks.length, done=0;
    chks.forEach(function(c){if(c.checked)done++});
    var pct=total?Math.round(done/total*100):0;
    ge('pf').style.width=pct+'%';
    ge('pt').textContent='已完成 '+done+'/'+total+' 项　'+pct+'%';
  }

  // ===== Price field hover =====
  document.querySelectorAll('.pw').forEach(function(pw){
    var inp=pw.querySelector('input');
    inp.addEventListener('focus',function(){pw.classList.add('hv')});
    inp.addEventListener('blur',function(){pw.classList.remove('hv')});
  });

  // ===== localStorage key =====
  function skey(){return 'dc_'+ge('pD').value}

  // ===== Bind events =====
  function bindField(el,fn){el.addEventListener('change',fn);el.addEventListener('input',fn)}

  // ===== Save to localStorage (current day) =====
  function collectData(){
    var chks=document.querySelectorAll('.chk');
    var checks=[];
    chks.forEach(function(c){checks.push(c.checked)});
    return {
      checks:checks,
      wakeTime:ge('wakeTime').value,
      sleepTime:ge('sleepTime').value,
      breakfastPrice:ge('breakfastPrice').value,
      breakfastFood:ge('breakfastFood').value,
      lunchPrice:ge('lunchPrice').value,
      lunchFood:ge('lunchFood').value,
      dinnerPrice:ge('dinnerPrice').value,
      dinnerFood:ge('dinnerFood').value,
      pD:ge('pD').value,
      pT:ge('pT').value
    };
  }

  function sav(){
    try{localStorage.setItem(skey(),JSON.stringify(collectData()))}catch(e){}
    updP();
  }

  function ld(){
    try{
      var d=JSON.parse(localStorage.getItem(skey()));
      if(!d)return;
      var chks=document.querySelectorAll('.chk');
      if(d.checks) d.checks.forEach(function(v,i){if(chks[i])chks[i].checked=v});
      if(d.wakeTime) ge('wakeTime').value=d.wakeTime;
      if(d.sleepTime) ge('sleepTime').value=d.sleepTime;
      if(d.breakfastPrice) ge('breakfastPrice').value=d.breakfastPrice;
      if(d.breakfastFood) ge('breakfastFood').value=d.breakfastFood;
      if(d.lunchPrice) ge('lunchPrice').value=d.lunchPrice;
      if(d.lunchFood) ge('lunchFood').value=d.lunchFood;
      if(d.dinnerPrice) ge('dinnerPrice').value=d.dinnerPrice;
      if(d.dinnerFood) ge('dinnerFood').value=d.dinnerFood;
    }catch(e){}
    updP();
  }

  // ===== Bind all inputs =====
  document.querySelectorAll('.chk').forEach(function(c){bindField(c,sav)});
  ['wakeTime','sleepTime','breakfastPrice','breakfastFood','lunchPrice','lunchFood','dinnerPrice','dinnerFood'].forEach(function(id){
    bindField(ge(id),sav);
  });
  bindField(ge('pD'),function(){ld()});

  // ===== Toast =====
  var toastTimer;
  function showToast(msg){
    var t=ge('toast');
    t.textContent=msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){t.classList.remove('show')},1800);
  }

  // ===== Reset =====
  ge('btnR').addEventListener('click',function(){
    if(!confirm('确定要重置今天的打卡记录吗？'))return;
    document.querySelectorAll('.chk').forEach(function(c){c.checked=false});
    ge('wakeTime').value='07:00';
    ge('sleepTime').value='22:00';
    ge('breakfastPrice').value='';
    ge('breakfastFood').value='';
    ge('lunchPrice').value='';
    ge('lunchFood').value='';
    ge('dinnerPrice').value='';
    ge('dinnerFood').value='';
    sav();
    showToast('已重置');
  });

  // ===== Save to IndexedDB =====
  ge('btnH').addEventListener('click', async function(){
    var data = collectData();
    var dateStr = ge('pD').value;
    if(!dateStr){showToast('请先选择日期');return;}

    var chks = document.querySelectorAll('.chk');
    var done = 0, total = chks.length;
    var doneItems = [], undoneItems = [];
    chks.forEach(function(c,i){
      if(c.checked){done++;doneItems.push(allCheckboxLabels[i]);}
      else{undoneItems.push(allCheckboxLabels[i]);}
    });

    var record = {
      date: dateStr,
      timestamp: Date.now(),
      wakeTime: data.wakeTime,
      sleepTime: data.sleepTime,
      totalItems: total,
      doneItems: doneItems,
      undoneItems: undoneItems,
      doneCount: done,
      pct: total ? Math.round(done/total*100) : 0,
      breakfastPrice: parseFloat(data.breakfastPrice) || 0,
      breakfastFood: data.breakfastFood,
      lunchPrice: parseFloat(data.lunchPrice) || 0,
      lunchFood: data.lunchFood,
      dinnerPrice: parseFloat(data.dinnerPrice) || 0,
      dinnerFood: data.dinnerFood,
      totalSpent: (parseFloat(data.breakfastPrice)||0)+(parseFloat(data.lunchPrice)||0)+(parseFloat(data.dinnerPrice)||0)
    };

    try{
      await db.records.put(record);
      showToast('✅ 记录已保存');
    }catch(e){
      showToast('保存失败: '+e.message);
    }
  });

  // ===== Screenshot =====
  ge('btnS').addEventListener('click',function(){
    // Show all panels for screenshot
    var panels = document.querySelectorAll('.pnl');
    panels.forEach(function(p){p.style.display='block'});
    ge('progArea').style.display='';

    var area = document.createElement('div');
    area.style.cssText = 'position:absolute;left:-9999px;top:0;width:500px;background:#fff;padding:0';
    document.body.appendChild(area);

    // Clone header + progress + all checkin panels
    var hdrClone = ge('hdrArea').cloneNode(true);
    var progClone = ge('progArea').cloneNode(true);
    area.appendChild(hdrClone);
    area.appendChild(progClone);

    for(var i=0;i<3;i++){
      var clone = ge('s'+i).cloneNode(true);
      clone.style.display='block';
      clone.style.padding='0 16px 16px';
      area.appendChild(clone);
    }

    html2canvas(area,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(function(canvas){
      document.body.removeChild(area);
      // Restore panel visibility
      doTab(curTab);

      var imgData = canvas.toDataURL('image/png');
      ge('previewImg').src = imgData;
      ge('previewModal').classList.add('show');
    }).catch(function(){
      document.body.removeChild(area);
      doTab(curTab);
      showToast('截图失败');
    });
  });

  // Modal close
  ge('modalClose').addEventListener('click',function(){
    ge('previewModal').classList.remove('show');
  });
  ge('previewModal').addEventListener('click',function(e){
    if(e.target === ge('previewModal')) ge('previewModal').classList.remove('show');
  });

  // ===== History Filter Mode Switching =====
  var histMode = ge('histMode');
  var filterInputs = ge('filterInputs');
  var filterDay = ge('filterDay');

  function updateFilterInputs(){
    var mode = histMode.value;
    var today = new Date();
    var y = today.getFullYear(), m = pad(today.getMonth()+1), d = pad(today.getDate());

    if(mode === 'day'){
      filterInputs.innerHTML = '<input type="date" id="filterDay" value="'+y+'-'+m+'-'+d+'">';
    } else if(mode === 'week'){
      // Use date range for week
      var dayOfWeek = today.getDay() || 7;
      var monday = new Date(today);
      monday.setDate(today.getDate() - dayOfWeek + 1);
      var my=monday.getFullYear(), mm=pad(monday.getMonth()+1), md=pad(monday.getDate());
      filterInputs.innerHTML = '<input type="date" id="filterStart" value="'+my+'-'+mm+'-'+md+'"> <span style="color:#999;font-size:12px">至</span> <input type="date" id="filterEnd" value="'+y+'-'+m+'-'+d+'">';
    } else if(mode === 'month'){
      filterInputs.innerHTML = '<input type="month" id="filterMonth" value="'+y+'-'+m+'">';
    } else if(mode === 'quarter'){
      var q = Math.ceil((today.getMonth()+1)/3);
      filterInputs.innerHTML = '<select id="filterYear"></select><select id="filterQ"><option value="1"'+(q===1?' selected':'')+'>Q1 (1-3月)</option><option value="2"'+(q===2?' selected':'')+'>Q2 (4-6月)</option><option value="3"'+(q===3?' selected':'')+'>Q3 (7-9月)</option><option value="4"'+(q===4?' selected':'')+'>Q4 (10-12月)</option></select>';
      var yearSel = filterInputs.querySelector('#filterYear');
      for(var yr=y;yr>=y-3;yr--){
        yearSel.innerHTML += '<option value="'+yr+'">'+yr+'年</option>';
      }
    } else if(mode === 'year'){
      filterInputs.innerHTML = '<select id="filterYear"></select>';
      var yearSel = filterInputs.querySelector('#filterYear');
      for(var yr=y;yr>=y-5;yr--){
        yearSel.innerHTML += '<option value="'+yr+'">'+yr+'年</option>';
      }
    }
  }

  histMode.addEventListener('change', updateFilterInputs);
  updateFilterInputs();

  // ===== Load History =====
  ge('filterBtn').addEventListener('click', loadHistory);

  async function getDateRange(){
    var mode = histMode.value;
    var startDate, endDate;

    if(mode === 'day'){
      var dayVal = filterInputs.querySelector('input[type="date"]')?.value;
      if(!dayVal) return null;
      startDate = dayVal;
      endDate = dayVal;
    } else if(mode === 'week'){
      startDate = filterInputs.querySelector('#filterStart')?.value;
      endDate = filterInputs.querySelector('#filterEnd')?.value;
      if(!startDate || !endDate) return null;
    } else if(mode === 'month'){
      var monthVal = filterInputs.querySelector('input[type="month"]')?.value;
      if(!monthVal) return null;
      var parts = monthVal.split('-');
      var yr = parseInt(parts[0]), mo = parseInt(parts[1]);
      startDate = yr+'-'+pad(mo)+'-01';
      var lastDay = new Date(yr, mo, 0).getDate();
      endDate = yr+'-'+pad(mo)+'-'+pad(lastDay);
    } else if(mode === 'quarter'){
      var yr = parseInt(filterInputs.querySelector('#filterYear')?.value);
      var q = parseInt(filterInputs.querySelector('#filterQ')?.value);
      var startMo = (q-1)*3+1;
      var endMo = q*3;
      startDate = yr+'-'+pad(startMo)+'-01';
      var lastDay = new Date(yr, endMo, 0).getDate();
      endDate = yr+'-'+pad(endMo)+'-'+pad(lastDay);
    } else if(mode === 'year'){
      var yr = parseInt(filterInputs.querySelector('#filterYear')?.value);
      startDate = yr+'-01-01';
      endDate = yr+'-12-31';
    }

    return {start: startDate, end: endDate, mode: mode};
  }

  async function loadHistory(){
    var range = await getDateRange();
    if(!range){
      ge('histContent').innerHTML = '<div class="hist-empty">请选择查询范围</div>';
      return;
    }

    try{
      var records = await db.records
        .where('date')
        .between(range.start, range.end, true, true)
        .sortBy('date');

      records.reverse(); // newest first

      if(records.length === 0){
        ge('histContent').innerHTML = '<div class="hist-empty">该时间范围内暂无打卡记录</div>';
        return;
      }

      var html = '';

      // ===== Report Section =====
      if(range.mode !== 'day'){
        html += buildReport(records, range);
      }

      // ===== Record Cards =====
      html += '<div class="hist-list">';
      records.forEach(function(r){
        var pctClass = r.pct >= 80 ? 'pct-high' : r.pct >= 50 ? 'pct-mid' : 'pct-low';
        html += '<div class="hist-card">';
        html += '<div class="hist-card-hdr">';
        html += '<span class="hist-card-date">📅 '+r.date+'</span>';
        html += '<div style="display:flex;align-items:center;gap:6px">';
        html += '<span class="hist-card-pct '+pctClass+'">'+r.pct+'% ('+r.doneCount+'/'+r.totalItems+')</span>';
        html += '<button class="hist-del" data-date="'+r.date+'" title="删除">🗑</button>';
        html += '</div></div>';

        // Done items
        html += '<div class="hist-card-body">';
        if(r.doneItems && r.doneItems.length){
          r.doneItems.forEach(function(item){
            html += '<span class="hist-tag">✓ '+item+'</span>';
          });
        }
        if(r.undoneItems && r.undoneItems.length){
          r.undoneItems.forEach(function(item){
            html += '<span class="hist-tag undone">'+item+'</span>';
          });
        }
        html += '</div>';

        // Meals
        var meals = [];
        if(r.breakfastFood) meals.push('早:'+r.breakfastFood+(r.breakfastPrice?'('+r.breakfastPrice+'元)':''));
        if(r.lunchFood) meals.push('午:'+r.lunchFood+(r.lunchPrice?'('+r.lunchPrice+'元)':''));
        if(r.dinnerFood) meals.push('晚:'+r.dinnerFood+(r.dinnerPrice?'('+r.dinnerPrice+'元)':''));
        if(meals.length){
          html += '<div class="hist-meals">🍽 '+meals.join(' | ')+'</div>';
        }

        // Times
        var times = [];
        if(r.wakeTime) times.push('起床 '+r.wakeTime);
        if(r.sleepTime) times.push('就寝 '+r.sleepTime);
        if(times.length){
          html += '<div class="hist-time">⏰ '+times.join(' · ')+'</div>';
        }

        html += '</div>';
      });
      html += '</div>';

      ge('histContent').innerHTML = html;

      // Bind delete buttons
      document.querySelectorAll('.hist-del').forEach(function(btn){
        btn.addEventListener('click', async function(){
          var dateKey = this.getAttribute('data-date');
          if(!confirm('确定删除 '+dateKey+' 的记录？'))return;
          try{
            await db.records.delete(dateKey);
            showToast('已删除');
            loadHistory();
          }catch(e){
            showToast('删除失败');
          }
        });
      });

    }catch(e){
      ge('histContent').innerHTML = '<div class="hist-empty">查询出错: '+e.message+'</div>';
    }
  }

  // ===== Build Report =====
  function buildReport(records, range){
    var html = '<div class="report-section">';
    var modeName = {week:'本周',month:'本月',quarter:'本季',year:'本年'}[range.mode] || '';
    html += '<div class="report-title">📈 '+modeName+'统计报表</div>';

    // Stats
    var totalDays = records.length;
    var avgPct = Math.round(records.reduce(function(s,r){return s+r.pct},0)/totalDays);
    var totalSpent = records.reduce(function(s,r){return s+(r.totalSpent||0)},0);
    var perfectDays = records.filter(function(r){return r.pct===100}).length;
    var avgDone = (records.reduce(function(s,r){return s+r.doneCount},0)/totalDays).toFixed(1);

    // Average wake/sleep times
    var wakeMins = [], sleepMins = [];
    records.forEach(function(r){
      if(r.wakeTime){
        var p = r.wakeTime.split(':');
        wakeMins.push(parseInt(p[0])*60+parseInt(p[1]));
      }
      if(r.sleepTime){
        var p = r.sleepTime.split(':');
        sleepMins.push(parseInt(p[0])*60+parseInt(p[1]));
      }
    });
    var avgWake = wakeMins.length ? Math.round(wakeMins.reduce(function(a,b){return a+b},0)/wakeMins.length) : null;
    var avgSleep = sleepMins.length ? Math.round(sleepMins.reduce(function(a,b){return a+b},0)/sleepMins.length) : null;

    html += '<div class="stat-grid">';
    html += '<div class="stat-card highlight"><div class="stat-val">'+totalDays+'</div><div class="stat-label">打卡天数</div></div>';
    html += '<div class="stat-card highlight"><div class="stat-val">'+avgPct+'%</div><div class="stat-label">平均完成率</div></div>';
    html += '<div class="stat-card"><div class="stat-val">'+perfectDays+'</div><div class="stat-label">满勤天数</div></div>';
    html += '<div class="stat-card"><div class="stat-val">'+avgDone+'</div><div class="stat-label">日均完成项</div></div>';
    if(avgWake !== null){
      html += '<div class="stat-card"><div class="stat-val">'+pad(Math.floor(avgWake/60))+':'+pad(avgWake%60)+'</div><div class="stat-label">平均起床</div></div>';
    }
    if(avgSleep !== null){
      html += '<div class="stat-card"><div class="stat-val">'+pad(Math.floor(avgSleep/60))+':'+pad(avgSleep%60)+'</div><div class="stat-label">平均就寝</div></div>';
    }
    html += '<div class="stat-card"><div class="stat-val">¥'+totalSpent.toFixed(0)+'</div><div class="stat-label">餐饮总花费</div></div>';
    html += '<div class="stat-card"><div class="stat-val">¥'+(totalSpent/totalDays).toFixed(0)+'</div><div class="stat-label">日均花费</div></div>';
    html += '</div>';

    // Bar Chart - completion rate by day
    if(records.length > 1 && records.length <= 60){
      html += '<div class="chart-wrap">';
      html += '<div class="chart-title">每日完成率趋势</div>';
      html += '<div class="bar-chart">';
      var sortedRecs = records.slice().reverse(); // oldest first for chart
      sortedRecs.forEach(function(r){
        var h = Math.max(2, r.pct * 1.1); // scale
        var dateLabel = r.date.substring(5); // MM-DD
        html += '<div class="bar-col">';
        html += '<div class="bar-val">'+r.pct+'%</div>';
        html += '<div class="bar-fill" style="height:'+h+'px"></div>';
        html += '<div class="bar-label">'+dateLabel+'</div>';
        html += '</div>';
      });
      html += '</div></div>';
    }

    // Spending chart
    if(records.length > 1 && records.length <= 60){
      var hasSpending = records.some(function(r){return r.totalSpent > 0});
      if(hasSpending){
        html += '<div class="chart-wrap">';
        html += '<div class="chart-title">每日餐饮花费 (元)</div>';
        html += '<div class="bar-chart">';
        var maxSpent = Math.max.apply(null, records.map(function(r){return r.totalSpent||1}));
        var sortedRecs = records.slice().reverse();
        sortedRecs.forEach(function(r){
          var h = Math.max(2, (r.totalSpent/maxSpent)*100);
          var dateLabel = r.date.substring(5);
          html += '<div class="bar-col">';
          html += '<div class="bar-val">¥'+r.totalSpent+'</div>';
          html += '<div class="bar-fill" style="height:'+h+'px;background:linear-gradient(180deg,#f6d365,#fda085)"></div>';
          html += '<div class="bar-label">'+dateLabel+'</div>';
          html += '</div>';
        });
        html += '</div></div>';
      }
    }

    // Heatmap for longer periods
    if(records.length > 7){
      html += '<div class="chart-wrap">';
      html += '<div class="chart-title">打卡热力图</div>';
      html += '<div class="heatmap-wrap">';
      // Create a map of date -> pct
      var dateMap = {};
      records.forEach(function(r){dateMap[r.date]=r.pct});
      // Generate all dates in range
      var cur = new Date(range.start);
      var end = new Date(range.end);
      while(cur <= end){
        var ds = cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-'+pad(cur.getDate());
        var pct = dateMap[ds] !== undefined ? dateMap[ds] : -1;
        var level = 0;
        if(pct >= 0){
          if(pct === 0) level = 1;
          else if(pct <= 25) level = 1;
          else if(pct <= 50) level = 2;
          else if(pct <= 75) level = 3;
          else if(pct < 100) level = 4;
          else level = 5;
        }
        html += '<div class="hm-cell hm-'+level+'" title="'+ds+': '+(pct>=0?pct+'%':'无记录')+'"></div>';
        cur.setDate(cur.getDate()+1);
      }
      html += '</div>';
      html += '<div class="hm-legend"><span>少</span>';
      for(var l=0;l<=5;l++){
        html += '<div class="hm-cell hm-'+l+'" style="display:inline-block"></div>';
      }
      html += '<span>多</span></div>';
      html += '</div>';
    }

    // Item completion ranking
    if(records.length > 1){
      html += '<div class="chart-wrap">';
      html += '<div class="chart-title">各项目完成排行</div>';
      var itemCounts = {};
      records.forEach(function(r){
        if(r.doneItems){
          r.doneItems.forEach(function(item){
            itemCounts[item] = (itemCounts[item]||0) + 1;
          });
        }
      });
      var sorted = Object.keys(itemCounts).sort(function(a,b){return itemCounts[b]-itemCounts[a]});
      sorted.forEach(function(item){
        var count = itemCounts[item];
        var pct = Math.round(count/totalDays*100);
        html += '<div style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">';
        html += '<span style="min-width:70px;color:#555">'+item+'</span>';
        html += '<div style="flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:4px"></div></div>';
        html += '<span style="min-width:50px;text-align:right;color:#667eea;font-weight:600">'+pct+'%</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  }
