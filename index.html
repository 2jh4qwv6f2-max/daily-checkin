<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>每日打卡汇报</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
.hdr{background:#0d0d18;border-bottom:1px solid rgba(255,255,255,.06);padding:12px 16px}
.hdr-in{display:flex;align-items:center;justify-content:space-between;max-width:500px;margin:0 auto}
.logo{font-size:17px;font-weight:700;color:#c084fc}
.dt-row{display:flex;align-items:center;gap:4px}
.dt-row input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#a0a0c0;font-size:14px;font-family:inherit;font-weight:500;border-radius:6px;padding:6px 8px;outline:none;-webkit-appearance:none}
.dt-row input[type="date"]{width:130px}.dt-row input[type="time"]{width:85px}
.tabs{display:flex;gap:4px;padding:10px 16px;max-width:500px;margin:0 auto;background:#0a0a0f}
.tbtn{flex:1;padding:10px 0;border:none;border-radius:10px;background:#1c1c2e;color:#8888a8;font-size:14px;font-weight:600;font-family:inherit;-webkit-appearance:none}
.tbtn.am{background:rgba(245,158,11,.15);color:#f59e0b}.tbtn.pm{background:rgba(6,182,212,.15);color:#06b6d4}.tbtn.em{background:rgba(139,92,246,.15);color:#8b5cf6}
.prog{max-width:500px;margin:8px auto 0;padding:0 16px}
.pbar{height:4px;background:#1c1c2e;border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#f59e0b,#06b6d4,#8b5cf6);transition:width .4s;width:0}
.ptx{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#555570;font-weight:500}
.wrap{max-width:500px;margin:0 auto;padding:12px 16px 20px}
.pnl{visibility:hidden;height:0;overflow:hidden;opacity:0;transition:opacity .2s}
.pnl.vis{visibility:visible;height:auto;overflow:visible;opacity:1}
.shd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sico-m{background:rgba(245,158,11,.15)}.sico-n{background:rgba(6,182,212,.15)}.sico-e{background:rgba(139,92,246,.15)}
.stt{font-size:19px;font-weight:700}
.stk{display:flex;flex-direction:column;gap:8px}
.stk input[type="checkbox"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.rw{display:flex;align-items:center;gap:12px;background:#1c1c2e;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.06);-webkit-user-select:none;user-select:none}.rw:active{background:#24243a}
.bx{width:22px;height:22px;min-width:22px;border-radius:7px;border:2px solid #555570;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.bx svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:all .15s}
input[type="checkbox"]:checked+.rw .bx{background:#6366f1;border-color:#6366f1}input[type="checkbox"]:checked+.rw .bx svg{opacity:1}input[type="checkbox"]:checked+.rw{border-color:rgba(99,102,241,.3)}input[type="checkbox"]:checked+.rw .tx{color:#555570;text-decoration:line-through}
.tx{flex:1;font-size:15px;font-weight:500}
.cg{display:flex;gap:6px}.cw{flex:1;position:relative}
.cw input[type="checkbox"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.cf{display:flex;align-items:center;justify-content:center;gap:7px;background:#1c1c2e;padding:14px 6px;border-radius:16px;border:1px solid rgba(255,255,255,.06);min-height:50px;-webkit-user-select:none;user-select:none}.cf:active{background:#24243a}
.cm{width:18px;height:18px;min-width:18px;border-radius:6px;border:2px solid #555570;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.cm svg{width:11px;height:11px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:all .15s}
.cw input:checked+.cf .cm{background:#6366f1;border-color:#6366f1}.cw input:checked+.cf .cm svg{opacity:1}.cw input:checked+.cf{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.08)}.cw input:checked+.cf .ct{color:#555570;text-decoration:line-through}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.cg2 .cf{padding:14px 10px}.cg2 .ct{font-size:15px}
.ic{background:#1c1c2e;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:10px}
.il{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.ir{display:flex;gap:8px;overflow:hidden}
.fd{flex:1;min-width:0;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e8e8f0;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}.fd:focus{border-color:#6366f1}.fd::placeholder{color:#555570}
.pw{display:flex;align-items:center;width:110px;flex:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}.pw:focus-within{border-color:#6366f1}
.pw input{flex:1;width:0;min-width:0;padding:10px 4px 10px 12px;border:none;background:none;color:#e8e8f0;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
.pw input::-webkit-inner-spin-button,.pw input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}.pw input::placeholder{color:#555570}
.pu{padding-right:10px;font-size:14px;color:#8888a8;white-space:nowrap;flex-shrink:0;display:none}.pw.hv .pu{display:block}

/* 时间输入框 */
.time-fd{
  padding:10px 12px;border-radius:10px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#e8e8f0;font-size:18px;font-family:inherit;font-weight:600;
  outline:none;-webkit-appearance:none;text-align:center;
  width:100%;letter-spacing:2px;
}
.time-fd:focus{border-color:#6366f1}
.time-fd::placeholder{color:#555570;font-weight:400;font-size:14px;letter-spacing:0}

.bot{background:#0d0d18;border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,8px))}
.bi{max-width:500px;margin:0 auto;display:flex;gap:10px}
.bn{flex:1;padding:14px;border:none;border-radius:16px;font-size:15px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-appearance:none}.bn:active{opacity:.7}
.bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.bs{background:#1c1c2e;color:#8888a8;border:1px solid rgba(255,255,255,.06)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1c1c2e;color:#e8e8f0;padding:12px 24px;border-radius:16px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:200;pointer-events:none;border:1px solid rgba(255,255,255,.06);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="hdr"><div class="hdr-in"><span class="logo">每日打卡</span><div class="dt-row"><input type="date" id="pD"><input type="time" id="pT" step="60"></div></div></div>
<div class="tabs"><button class="tbtn am" id="t0" type="button">🌅 早上</button><button class="tbtn" id="t1" type="button">🌞 中午</button><button class="tbtn" id="t2" type="button">🌙 晚上</button></div>
<div class="prog"><div class="pbar"><div class="pfill" id="pf"></div></div><div class="ptx"><span id="pl">已完成 0 项</span><span id="pp">0%</span></div></div>
<div class="wrap">
<div class="pnl vis" id="s0"><div class="shd"><div class="sico sico-m">🌅</div><div class="stt">早上</div></div><div class="stk">
  <div class="ic"><div class="il">⏰ 起床时间</div><input type="text" inputmode="numeric" id="wakeTime" class="time-fd" placeholder="点击输入 如 0730" maxlength="5"></div>
  <div class="cg"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">刷牙</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">洗脸</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">洗头</span></div></label></div>
  <div class="cg cg2"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">脸部擦药</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">手部擦药</span></div></label></div>
  <div class="cg"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">换干净衣服</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">整理发型</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">整理衣服</span></div></label></div>
  <div class="ic"><div class="il">🍳 早餐</div><div class="ir"><div class="pw" id="w0"><input type="number" inputmode="decimal" pattern="[0-9]*" placeholder="¥ 价格" id="breakfastPrice"><span class="pu">元</span></div><input class="fd" type="text" placeholder="吃了什么" id="breakfastFood"></div></div>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="tx">餐后漱口</span></div></label>
</div></div>
<div class="pnl" id="s1"><div class="shd"><div class="sico sico-n">🌞</div><div class="stt">中午</div></div><div class="stk">
  <div class="ic"><div class="il">🍜 午餐</div><div class="ir"><div class="pw" id="w1"><input type="number" inputmode="decimal" pattern="[0-9]*" placeholder="¥ 价格" id="lunchPrice"><span class="pu">元</span></div><input class="fd" type="text" placeholder="吃了什么" id="lunchFood"></div></div>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="tx">餐后漱口</span></div></label>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="tx">午休</span></div></label>
  <div class="cg cg2"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">整理发型</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">整理衣服</span></div></label></div>
</div></div>
<div class="pnl" id="s2"><div class="shd"><div class="sico sico-e">🌙</div><div class="stt">晚上</div></div><div class="stk">
  <div class="ic"><div class="il">🍲 晚餐</div><div class="ir"><div class="pw" id="w2"><input type="number" inputmode="decimal" pattern="[0-9]*" placeholder="¥ 价格" id="dinnerPrice"><span class="pu">元</span></div><input class="fd" type="text" placeholder="吃了什么" id="dinnerFood"></div></div>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="tx">餐后漱口</span></div></label>
  <div class="cg"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">洗澡</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">洗头</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">洗脚</span></div></label></div>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="tx">睡前刷牙</span></div></label>
  <div class="cg cg2"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">脸部擦药</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg></div><span class="ct">手部擦药</span></div></label></div>
  <div class="ic"><div class="il">😴 睡觉时间</div><input type="text" inputmode="numeric" id="sleepTime" class="time-fd" placeholder="点击输入 如 2230" maxlength="5"></div>
</div></div>
</div>
<div class="bot"><div class="bi"><button class="bn bs" id="btnR" type="button">↺ 重置</button><button class="bn bp" id="btnS" type="button">📸 生成截图</button></div></div>
<script>
(function(){
  function pad(n){return n<10?'0'+n:''+n;}
  function ge(id){return document.getElementById(id);}
  var now=new Date();
  ge('pD').value=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  ge('pT').value=pad(now.getHours())+':'+pad(now.getMinutes());
  function getCurDT(){var d=ge('pD').value,t=ge('pT').value;if(d&&t)return new Date(d+'T'+t);return new Date();}
  var tbs=[ge('t0'),ge('t1'),ge('t2')],pns=[ge('s0'),ge('s1'),ge('s2')],tcls=['am','pm','em'];
  function doTab(idx){for(var i=0;i<3;i++){tbs[i].className='tbtn';pns[i].className='pnl';}tbs[idx].className='tbtn '+tcls[idx];pns[idx].className='pnl vis';}
  tbs[0].onclick=function(){doTab(0);};tbs[1].onclick=function(){doTab(1);};tbs[2].onclick=function(){doTab(2);};
  var chks=document.querySelectorAll('.chk');
  function updP(){var total=chks.length,done=0;for(var i=0;i<total;i++){if(chks[i].checked)done++;}var pct=total>0?Math.round(done/total*100):0;ge('pf').style.width=pct+'%';ge('pl').textContent='已完成 '+done+'/'+total+' 项';ge('pp').textContent=pct+'%';}
  for(var i=0;i<chks.length;i++){chks[i].onchange=function(){updP();sav();};}
  function spw(iid,wid){var inp=ge(iid),w=ge(wid);function u(){w.className=inp.value?'pw hv':'pw';}inp.oninput=function(){u();sav();};inp.onchange=function(){u();sav();};u();}

  // 时间自动格式化：输入数字自动加冒号
  function setupTimeInput(id){
    var el=ge(id);
    el.oninput=function(){
      // 只保留数字
      var nums=el.value.replace(/[^0-9]/g,'');
      if(nums.length>=3){
        el.value=nums.substring(0,2)+':'+nums.substring(2,4);
      }else{
        el.value=nums;
      }
      sav();
    };
    el.onchange=sav;
    el.onblur=function(){
      // 失焦时格式化
      var nums=el.value.replace(/[^0-9]/g,'');
      if(nums.length===3) nums='0'+nums;
      if(nums.length>=4){
        var h=parseInt(nums.substring(0,2)),m=parseInt(nums.substring(2,4));
        if(h>23)h=23;if(m>59)m=59;
        el.value=pad(h)+':'+pad(m);
      }else if(nums.length>0){
        el.value=nums; // 不完整，保留
      }
      sav();
    };
  }
  setupTimeInput('wakeTime');
  setupTimeInput('sleepTime');

  var fids=['wakeTime','sleepTime','breakfastPrice','breakfastFood','lunchPrice','lunchFood','dinnerPrice','dinnerFood'];
  function skey(){var d=getCurDT();return 'dk_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate();}
  function sav(){
    try{
      var o={c:[],f:{}};
      for(var j=0;j<chks.length;j++)o.c.push(chks[j].checked);
      for(var j=0;j<fids.length;j++){var v=ge(fids[j]).value;if(v)o.f[fids[j]]=v;}
      localStorage.setItem(skey(),JSON.stringify(o));
    }catch(e){}
  }
  function ld(){
    try{var raw=localStorage.getItem(skey());if(!raw)return;var o=JSON.parse(raw);
    if(o.c){for(var j=0;j<chks.length&&j<o.c.length;j++)chks[j].checked=!!o.c[j];}
    if(o.f){for(var j=0;j<fids.length;j++){if(o.f[fids[j]])ge(fids[j]).value=o.f[fids[j]];}}
    updP();}catch(e){}
  }
  var allInputs=document.querySelectorAll('.fd');
  for(var i=0;i<allInputs.length;i++){allInputs[i].onchange=sav;allInputs[i].oninput=sav;allInputs[i].onblur=sav;}

  function toast(m){var t=ge('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},2000);}
  ge('btnR').onclick=function(){if(!confirm('确定要重置所有打卡记录吗？'))return;for(var j=0;j<chks.length;j++)chks[j].checked=false;for(var j=0;j<fids.length;j++)ge(fids[j]).value='';try{localStorage.removeItem(skey());}catch(e){}updP();spw('breakfastPrice','w0');spw('lunchPrice','w1');spw('dinnerPrice','w2');toast('已重置 ✓');};

  // ══ 截图 ══
  ge('btnS').onclick=function(){
    var wake=ge('wakeTime').value;
    var sleep=ge('sleepTime').value;
    // 兜底localStorage
    if(!wake||!sleep){try{var raw=localStorage.getItem(skey());if(raw){var st=JSON.parse(raw);if(st.f){if(!wake)wake=st.f.wakeTime||'';if(!sleep)sleep=st.f.sleepTime||'';}}}catch(e){}}

    var total=chks.length,done=0;
    for(var i=0;i<total;i++){if(chks[i].checked)done++;}
    var pct=total>0?Math.round(done/total*100):0;
    var dt=getCurDT(),wks=['日','一','二','三','四','五','六'];
    var ds=dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 周'+wks[dt.getDay()];
    var bP=ge('breakfastPrice').value,bF=ge('breakfastFood').value||'未记录';
    var lP=ge('lunchPrice').value,lF=ge('lunchFood').value||'未记录';
    var dP=ge('dinnerPrice').value,dF=ge('dinnerFood').value||'未记录';
    // 兜底
    if(!bP||!lP||!dP||bF==='未记录'||lF==='未记录'||dF==='未记录'){try{var raw=localStorage.getItem(skey());if(raw){var st=JSON.parse(raw);if(st.f){if(!bP&&st.f.breakfastPrice)bP=st.f.breakfastPrice;if(bF==='未记录'&&st.f.breakfastFood)bF=st.f.breakfastFood;if(!lP&&st.f.lunchPrice)lP=st.f.lunchPrice;if(lF==='未记录'&&st.f.lunchFood)lF=st.f.lunchFood;if(!dP&&st.f.dinnerPrice)dP=st.f.dinnerPrice;if(dF==='未记录'&&st.f.dinnerFood)dF=st.f.dinnerFood;}}}catch(e){}}
    if(!bF)bF='未记录';if(!lF)lF='未记录';if(!dF)dF='未记录';
    var spend=(parseFloat(bP)||0)+(parseFloat(lP)||0)+(parseFloat(dP)||0);

    function col(sid){var s=ge(sid),lbs=s.querySelectorAll('label'),arr=[];for(var k=0;k<lbs.length;k++){var cb=lbs[k].querySelector('.chk');var tx=lbs[k].querySelector('.tx')||lbs[k].querySelector('.ct');if(cb&&tx)arr.push({t:tx.textContent,ok:cb.checked});}return arr;}
    function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

    var SC=4,LW=390*SC,LM=20*SC,RM=20*SC,CW=LW-LM-RM;
    var cv=document.createElement('canvas');cv.width=LW;
    var ctx=cv.getContext('2d');
    var fn=function(sz,wt){return(wt||'500')+' '+(sz*SC)+'px -apple-system,"PingFang SC",sans-serif';};
    var S=function(v){return v*SC;};
    var secData=[
      {tt:'🌅 早上',time:wake?'起床 '+wake:'',cl:'#f59e0b',me:'🍳',ml:'早餐',mp:bP,mf:bF,it:col('s0')},
      {tt:'🌞 中午',time:'',cl:'#06b6d4',me:'🍜',ml:'午餐',mp:lP,mf:lF,it:col('s1')},
      {tt:'🌙 晚上',time:sleep?'就寝 '+sleep:'',cl:'#8b5cf6',me:'🍲',ml:'晚餐',mp:dP,mf:dF,it:col('s2')}
    ];
    function draw(measure){
      var cy=S(28);
      if(!measure){ctx.font=fn(20,'900');ctx.fillStyle='#c084fc';ctx.textAlign='center';ctx.fillText('每日打卡汇报',LW/2,cy);}
      cy+=S(22);
      if(!measure){ctx.font=fn(11);ctx.fillStyle='#8888a8';ctx.fillText(ds,LW/2,cy);}
      cy+=S(26);
      var cardH=S(62);
      if(!measure){
        ctx.fillStyle='#1c1c2e';rr(ctx,LM,cy,CW,cardH,S(7));ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=SC*0.5;rr(ctx,LM,cy,CW,cardH,S(7));ctx.stroke();
        ctx.font=fn(9);ctx.fillStyle='#8888a8';ctx.textAlign='center';ctx.fillText('今日完成度',LW/2,cy+S(16));
        var bx=LM+S(16),bw=CW-S(32),barY=cy+S(24);
        ctx.fillStyle='rgba(255,255,255,0.06)';rr(ctx,bx,barY,bw,S(4),S(2));ctx.fill();
        if(pct>0){var grd=ctx.createLinearGradient(bx,0,bx+bw,0);grd.addColorStop(0,'#f59e0b');grd.addColorStop(.5,'#06b6d4');grd.addColorStop(1,'#8b5cf6');ctx.fillStyle=grd;rr(ctx,bx,barY,bw*pct/100,S(4),S(2));ctx.fill();}
        ctx.font=fn(22,'900');ctx.fillStyle='#a78bfa';ctx.fillText(pct+'%',LW/2,cy+S(46));
        ctx.font=fn(9);ctx.fillStyle='#555570';ctx.fillText(done+'/'+total+' 项 · 餐饮消费 ¥'+spend.toFixed(0),LW/2,cy+S(57));
      }
      cy+=cardH+S(28);
      for(var si=0;si<secData.length;si++){
        var s=secData[si];
        if(si>0){var ly=cy-S(14);if(!measure){ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.5;ctx.setLineDash([S(4),S(4)]);ctx.beginPath();ctx.moveTo(LM,ly);ctx.lineTo(LW-RM,ly);ctx.stroke();ctx.setLineDash([]);}}
        if(!measure){ctx.textAlign='left';ctx.font=fn(14,'700');ctx.fillStyle=s.cl;var ttx=s.tt;if(s.time)ttx+=' · '+s.time;ctx.fillText(ttx,LM,cy);}
        cy+=S(10);
        if(!measure){ctx.textAlign='left';ctx.font=fn(11);ctx.fillStyle='#e8e8f0';var mt=s.me+' '+s.ml+': '+s.mf;ctx.fillText(mt,LM,cy+S(11));if(s.mp){var bw2=ctx.measureText(mt+'  ').width;ctx.fillStyle='#f59e0b';ctx.font=fn(11,'700');ctx.fillText('¥'+s.mp,LM+bw2,cy+S(11));}}
        cy+=S(22);
        var tagX=LM;ctx.font=fn(10);
        for(var j=0;j<s.it.length;j++){
          var it=s.it[j],lb=(it.ok?'✓ ':'○ ')+it.t;ctx.font=fn(10);
          var tw=ctx.measureText(lb).width+S(12);
          if(tagX+tw>LW-RM){tagX=LM;cy+=S(20);}
          if(!measure){ctx.fillStyle=it.ok?'rgba(99,102,241,0.15)':'rgba(255,255,255,0.04)';rr(ctx,tagX,cy,tw,S(15),S(4));ctx.fill();ctx.strokeStyle=it.ok?'rgba(99,102,241,0.3)':'rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.4;rr(ctx,tagX,cy,tw,S(15),S(4));ctx.stroke();ctx.fillStyle=it.ok?'#a5b4fc':'#555570';ctx.font=fn(10);ctx.fillText(lb,tagX+S(6),cy+S(11));}
          tagX+=tw+S(5);
        }
        cy+=S(40);
      }
      cy-=S(10);
      if(!measure){ctx.textAlign='center';ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.4;ctx.beginPath();ctx.moveTo(LM,cy);ctx.lineTo(LW-RM,cy);ctx.stroke();cy+=S(16);ctx.font=fn(9);ctx.fillStyle='#555570';ctx.fillText('每日打卡汇报 · '+ds,LW/2,cy);}
      else{cy+=S(20);}
      return cy;
    }
    var totalH=draw(true);cv.height=totalH;ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,LW,totalH);draw(false);
    try{var url=cv.toDataURL('image/png');var a=document.createElement('a');a.href=url;a.download='每日汇报_'+(dt.getMonth()+1)+'月'+dt.getDate()+'日.png';document.body.appendChild(a);a.click();document.body.removeChild(a);toast('截图已保存 📸');}catch(e){toast('截图失败: '+e.message);}
  };

  ld();updP();spw('breakfastPrice','w0');spw('lunchPrice','w1');spw('dinnerPrice','w2');
})();
</script>
