<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>每日打卡汇报</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB',sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
.hdr{background:#0d0d18;border-bottom:1px solid rgba(255,255,255,.06);padding:12px 16px}
.hdr-in{display:flex;align-items:center;justify-content:space-between;max-width:500px;margin:0 auto}
.logo{font-size:17px;font-weight:700;color:#c084fc}
.dt-row{display:flex;align-items:center;gap:4px}
.dt-row input{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#a0a0c0;font-size:14px;font-family:inherit;font-weight:500;border-radius:6px;padding:6px 8px;outline:none;-webkit-appearance:none}
.dt-row input[type="date"]{width:130px}.dt-row input[type="time"]{width:85px}
.tabs{display:flex;gap:4px;padding:10px 16px;max-width:500px;margin:0 auto;background:#0a0a0f}
.tbtn{flex:1;padding:10px 0;border:none;border-radius:10px;background:#1c1c2e;color:#8888a8;font-size:14px;font-weight:600;font-family:inherit;-webkit-appearance:none}
.tbtn.am{background:rgba(245,158,11,.15);color:#f59e0b}.tbtn.pm{background:rgba(6,182,212,.15);color:#06b6d4}.tbtn.em{background:rgba(139,92,246,.15);color:#8b5cf6}
.prog{max-width:500px;margin:8px auto 0;padding:0 16px}
.pbar{height:4px;background:#1c1c2e;border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#f59e0b,#06b6d4,#8b5cf6);transition:width .4s;width:0}
.ptx{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#555570;font-weight:500}
.wrap{max-width:500px;margin:0 auto;padding:12px 16px 20px}
/* 关键：用position+clip隐藏panel，保持input值可读 */
.pnl{position:absolute;left:-9999px;opacity:0}
.pnl.vis{position:static;left:auto;opacity:1}
.shd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px}
.sico-m{background:rgba(245,158,11,.15)}.sico-n{background:rgba(6,182,212,.15)}.sico-e{background:rgba(139,92,246,.15)}
.stt{font-size:19px;font-weight:700}
.stk{display:flex;flex-direction:column;gap:8px}
.stk input[type="checkbox"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.rw{display:flex;align-items:center;gap:12px;background:#1c1c2e;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.06);-webkit-user-select:none;user-select:none}.rw:active{background:#24243a}
.bx{width:22px;height:22px;min-width:22px;border-radius:7px;border:2px solid #555570;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.bx svg{width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:all .15s}
input[type="checkbox"]:checked+.rw .bx{background:#6366f1;border-color:#6366f1}input[type="checkbox"]:checked+.rw .bx svg{opacity:1}input[type="checkbox"]:checked+.rw{border-color:rgba(99,102,241,.3)}input[type="checkbox"]:checked+.rw .tx{color:#555570;text-decoration:line-through}
.tx{flex:1;font-size:15px;font-weight:500}
.cg{display:flex;gap:6px}.cw{flex:1;position:relative}
.cw input[type="checkbox"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.cf{display:flex;align-items:center;justify-content:center;gap:7px;background:#1c1c2e;padding:14px 6px;border-radius:16px;border:1px solid rgba(255,255,255,.06);min-height:50px;-webkit-user-select:none;user-select:none}.cf:active{background:#24243a}
.cm{width:18px;height:18px;min-width:18px;border-radius:6px;border:2px solid #555570;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.cm svg{width:11px;height:11px;stroke:#fff;stroke-width:3;fill:none;opacity:0;transition:all .15s}
.cw input:checked+.cf .cm{background:#6366f1;border-color:#6366f1}.cw input:checked+.cf .cm svg{opacity:1}.cw input:checked+.cf{border-color:rgba(99,102,241,.3);background:rgba(99,102,241,.08)}.cw input:checked+.cf .ct{color:#555570;text-decoration:line-through}
.ct{font-size:14px;font-weight:500;white-space:nowrap}
.cg2 .cf{padding:14px 10px}.cg2 .ct{font-size:15px}
.ic{background:#1c1c2e;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:10px}
.il{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.ir{display:flex;gap:8px;overflow:hidden}
.fd{flex:1;min-width:0;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e8e8f0;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}.fd:focus{border-color:#6366f1}.fd::placeholder{color:#555570}
.pw{display:flex;align-items:center;width:110px;flex:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden}.pw:focus-within{border-color:#6366f1}
.pw input{flex:1;width:0;min-width:0;padding:10px 4px 10px 12px;border:none;background:none;color:#e8e8f0;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;-moz-appearance:textfield}
.pw input::-webkit-inner-spin-button,.pw input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}.pw input::placeholder{color:#555570}
.pu{padding-right:10px;font-size:14px;color:#8888a8;white-space:nowrap;flex-shrink:0;display:none}.pw.hv .pu{display:block}
.tfd{
  width:100%;padding:10px 12px;border-radius:10px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#e8e8f0;font-size:16px;font-family:inherit;
  outline:none;-webkit-appearance:none;min-height:44px;
}
.tfd:focus{border-color:#6366f1}
.bot{background:#0d0d18;border-top:1px solid rgba(255,255,255,.06);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom,8px))}
.bi{max-width:500px;margin:0 auto;display:flex;gap:10px}
.bn{flex:1;padding:14px;border:none;border-radius:16px;font-size:15px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-appearance:none}.bn:active{opacity:.7}
.bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}.bs{background:#1c1c2e;color:#8888a8;border:1px solid rgba(255,255,255,.06)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1c1c2e;color:#e8e8f0;padding:12px 24px;border-radius:16px;font-size:14px;font-weight:500;opacity:0;transition:all .3s;z-index:200;pointer-events:none;border:1px solid rgba(255,255,255,.06);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.qk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fd-wrap{flex:1;min-width:0;position:relative;display:flex;align-items:center}
.fd-wrap .fd{flex:1;padding-right:28px}
.fd-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:none;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.1);color:#8888a8;font-size:11px;cursor:pointer;-webkit-user-select:none;user-select:none;line-height:1}
.fd-wrap .fd:not(:placeholder-shown)~.fd-clear{display:flex}
.qk-tag{display:inline-block;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#a0a0c0;font-size:12px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s}
.qk-tag:active{background:rgba(99,102,241,.2)}
.qk-tag.sel{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.qk-home-row{margin-top:8px}
.qk-home-label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;-webkit-user-select:none;user-select:none}
.qk-home-cb{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.qk-home-tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#a0a0c0;font-size:13px;font-weight:500;transition:all .15s}
.qk-home-cb:checked+.qk-home-tag{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#4ade80}
.reason-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.reason-box{background:#1a1a2e;border-radius:20px;border:1px solid rgba(255,255,255,.08);width:100%;max-width:440px;max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.reason-title{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:16px;text-align:center}
.reason-sec{margin-bottom:14px}
.reason-sec-hd{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.reason-sec-hd.am-c{color:#f59e0b}.reason-sec-hd.pm-c{color:#06b6d4}.reason-sec-hd.em-c{color:#8b5cf6}
.reason-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 12px;margin-bottom:8px}
.reason-item-name{font-size:13px;font-weight:600;color:#c0c0d8;margin-bottom:6px}
.reason-qk{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.reason-qk-btn{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#a0a0c0;font-size:12px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s}
.reason-qk-btn:active,.reason-qk-btn.sel{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.reason-input{width:100%;padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e8e8f0;font-size:13px;font-family:inherit;outline:none;-webkit-appearance:none}
.reason-input:focus{border-color:#6366f1}
.reason-btns{display:flex;gap:10px;margin-top:16px}
.reason-btn{flex:1;padding:12px;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.reason-btn-ok{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.reason-btn-cancel{background:#1c1c2e;color:#8888a8;border:1px solid rgba(255,255,255,.06)}
.tbtn.ht{background:rgba(34,197,94,.15);color:#22c55e}
.hq-btn{padding:7px 14px;border:1px solid rgba(255,255,255,.08);border-radius:8px;background:rgba(255,255,255,.04);color:#a0a0c0;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;-webkit-appearance:none}
.hq-btn.hq-sel{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:#a5b4fc}
.h-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.h-stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;text-align:center}
.h-stat-val{font-size:20px;font-weight:800;color:#a78bfa}
.h-stat-lbl{font-size:11px;color:#8888a8;margin-top:2px}
.h-day{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;margin-top:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.h-day:active{background:rgba(255,255,255,.08)}
.h-day-top{display:flex;justify-content:space-between;align-items:center}
.h-day-date{font-size:14px;font-weight:600;color:#e8e8f0}
.h-day-pct{font-size:14px;font-weight:700}
.h-day-bot{display:flex;gap:10px;margin-top:4px;font-size:12px;color:#8888a8}
.h-day-edit{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;background:rgba(245,158,11,.15);color:#f59e0b;font-size:11px;font-weight:600;cursor:pointer}
.h-log-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.h-log-hd{display:flex;justify-content:space-between;font-size:12px;color:#8888a8;margin-bottom:6px}
.h-log-reason{font-size:12px;color:#f59e0b;margin-bottom:6px}
.h-log-change{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.h-log-change:last-child{border-bottom:none}
.h-log-field{color:#a0a0c0;flex-shrink:0}
.h-log-diff{color:#e8e8f0;text-align:right}
.h-log-diff .old{color:#ef4444;text-decoration:line-through;margin-right:4px}
.h-log-diff .new{color:#22c55e}
.h-loading{text-align:center;padding:20px;color:#555570;font-size:13px}

/* ── 打卡详情弹窗 ── */
.detail-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.detail-box{background:#1a1a2e;border-radius:20px;border:1px solid rgba(255,255,255,.08);width:100%;max-width:440px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.detail-title{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:4px;text-align:center}
.detail-sub{font-size:12px;color:#8888a8;text-align:center;margin-bottom:16px}
.detail-sec{margin-bottom:14px}
.detail-sec-hd{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.detail-meal{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;color:#c0c0d8;display:flex;align-items:center;gap:8px}
.detail-meal-icon{font-size:16px;flex-shrink:0}
.detail-meal-info{flex:1}
.detail-meal-price{color:#f59e0b;font-weight:700;flex-shrink:0}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.detail-tag{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500}
.detail-tag.done{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc}
.detail-tag.undone{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#555570;text-decoration:line-through}
.detail-reason{margin-top:6px;font-size:12px;color:#f59e0b;padding:6px 10px;background:rgba(245,158,11,.08);border-radius:8px}
.detail-time-row{display:flex;gap:8px;margin-bottom:12px;justify-content:center}
.detail-time-chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 14px;font-size:13px;color:#a0a0c0;display:flex;align-items:center;gap:4px}
.detail-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.detail-summary-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:8px 10px;text-align:center}
.detail-summary-val{font-size:18px;font-weight:800}
.detail-summary-lbl{font-size:11px;color:#8888a8;margin-top:2px}

/* ── PWA 安装引导 ── */
.pwa-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:400;display:flex;align-items:flex-end;justify-content:center;padding:16px}
.pwa-box{background:#1a1a2e;border-radius:20px 20px 0 0;border:1px solid rgba(255,255,255,.08);border-bottom:none;width:100%;max-width:440px;padding:24px 20px calc(20px + env(safe-area-inset-bottom,8px));animation:pwaSlideUp .3s ease-out}
@keyframes pwaSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pwa-title{font-size:18px;font-weight:700;color:#e8e8f0;text-align:center;margin-bottom:4px}
.pwa-desc{font-size:13px;color:#8888a8;text-align:center;margin-bottom:16px;line-height:1.5}
.pwa-steps{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:16px}
.pwa-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:14px;color:#c0c0d8}
.pwa-step:not(:last-child){border-bottom:1px solid rgba(255,255,255,.06)}
.pwa-step-num{width:22px;height:22px;border-radius:50%;background:rgba(99,102,241,.2);color:#a5b4fc;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.pwa-step-text{flex:1;line-height:1.5}
.pwa-step-text .key{color:#a5b4fc;font-weight:600}
.pwa-btns{display:flex;gap:10px}
.pwa-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none}
.pwa-btn-ok{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.pwa-btn-skip{background:#1c1c2e;color:#8888a8;border:1px solid rgba(255,255,255,.06)}
.pwa-icon-preview{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.pwa-icon-box{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px}
.pwa-arrow{color:#555570;font-size:20px}

/* ── 快速标签管理 ── */
.qk-manage-btn{display:inline-flex;align-items:center;justify-content:center;padding:5px 8px;border-radius:7px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-size:12px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .15s;flex-shrink:0;line-height:1;font-weight:500}
.qk-manage-btn:active{background:rgba(99,102,241,.3)}
.manage-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.manage-box{background:#1a1a2e;border-radius:20px;border:1px solid rgba(255,255,255,.08);width:100%;max-width:440px;max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px}
.manage-title{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:16px;text-align:center}
.manage-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.manage-item{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#a0a0c0;font-size:13px}
.manage-item .del{color:#ef4444;font-size:11px;cursor:pointer;opacity:.6;margin-left:2px;font-weight:700}
.manage-item .del:active{opacity:1}
.manage-add-row{display:flex;gap:8px;margin-bottom:16px}
.manage-add-input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e8e8f0;font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.manage-add-input:focus{border-color:#6366f1}
.manage-add-input::placeholder{color:#555570}
.manage-add-btn{padding:10px 16px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:14px;font-weight:600;font-family:inherit;-webkit-appearance:none;white-space:nowrap}
.manage-add-btn:active{opacity:.7}
.manage-close{width:100%;padding:12px;border:none;border-radius:14px;background:#1c1c2e;color:#8888a8;border:1px solid rgba(255,255,255,.06);font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none}
.manage-close:active{opacity:.7}
/* ── 登录注册界面 ── */
.auth-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0f;z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.auth-box{width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px}
.auth-logo-text{font-size:22px;font-weight:800;color:#c084fc}
.auth-form{background:#1a1a2e;border-radius:20px;border:1px solid rgba(255,255,255,.08);padding:24px}
.auth-title{font-size:17px;font-weight:700;color:#e8e8f0;margin-bottom:16px;text-align:center}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:13px;color:#8888a8;margin-bottom:4px;font-weight:500}
.auth-field input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e8e8f0;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.auth-field input:focus{border-color:#6366f1}
.auth-field input::placeholder{color:#555570}
.auth-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none;margin-top:8px;cursor:pointer}
.auth-btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.auth-btn-primary:active{opacity:.8}
.auth-btn-secondary{background:transparent;color:#8888a8;margin-top:12px}
.auth-error{color:#ef4444;font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.auth-success{color:#22c55e;font-size:13px;text-align:center;margin-top:8px}
.auth-divider{display:flex;align-items:center;gap:10px;margin:12px 0}
.auth-divider-line{flex:1;height:1px;background:rgba(255,255,255,.08)}
.auth-divider-text{font-size:12px;color:#555570;white-space:nowrap}
.auth-link{text-align:center;margin-top:10px;font-size:13px;color:#6366f1;cursor:pointer;padding:4px}
.auth-code-row{display:flex;gap:8px}
.auth-code-row input{flex:1}
.auth-code-btn{white-space:nowrap;padding:12px 14px;border:1px solid #6366f1;border-radius:12px;background:transparent;color:#6366f1;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;-webkit-appearance:none;flex-shrink:0}
.auth-code-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-email-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:6px 10px;font-size:12px;color:#a78bfa;margin-bottom:12px;width:100%;box-sizing:border-box}
.auth-email-badge-icon{font-size:14px}
.auth-email-none{font-size:12px;color:#555570;text-align:center;margin-bottom:12px;padding:8px;background:rgba(255,255,255,.03);border-radius:8px;border:1px dashed rgba(255,255,255,.08)}
.auth-pending{text-align:center;padding:40px 20px}
.auth-pending-icon{font-size:48px;margin-bottom:16px}
.auth-pending-title{font-size:18px;font-weight:700;color:#e8e8f0;margin-bottom:8px}
.auth-pending-desc{font-size:14px;color:#8888a8;line-height:1.6}

/* ── 管理面板 ── */
.admin-user{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px;margin-bottom:8px}
.admin-user-top{display:flex;justify-content:space-between;align-items:center}
.admin-user-name{font-size:14px;font-weight:600;color:#e8e8f0}
.admin-user-status{font-size:12px;font-weight:600;padding:2px 8px;border-radius:6px}
.admin-user-status.pending{background:rgba(245,158,11,.15);color:#f59e0b}
.admin-user-status.approved{background:rgba(34,197,94,.15);color:#22c55e}
.admin-user-status.rejected{background:rgba(239,68,68,.15);color:#ef4444}
.admin-user-meta{font-size:12px;color:#8888a8;margin-top:4px}
.admin-user-actions{display:flex;gap:6px;margin-top:8px}
.admin-btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;-webkit-appearance:none;cursor:pointer}
.admin-btn-approve{background:rgba(34,197,94,.2);color:#22c55e}
.admin-btn-reject{background:rgba(239,68,68,.2);color:#ef4444}
.admin-btn:active{opacity:.7}

/* ── 用户菜单 ── */
.user-menu-btn{font-size:13px;color:#a0a0c0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:4px 10px;cursor:pointer;-webkit-user-select:none;user-select:none;font-family:inherit;-webkit-appearance:none}
.user-menu-btn:active{background:rgba(99,102,241,.2)}
.user-menu-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.user-menu-box{background:#1a1a2e;border-radius:20px;border:1px solid rgba(255,255,255,.08);width:100%;max-width:380px;padding:20px}
.user-menu-item{display:flex;align-items:center;gap:10px;padding:14px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-bottom:8px;cursor:pointer;-webkit-user-select:none;user-select:none;color:#e8e8f0;font-size:14px;font-weight:500}
.user-menu-item:active{background:rgba(99,102,241,.15)}
.user-menu-item.danger{color:#ef4444}
.device-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;margin-bottom:6px}
.device-info{font-size:13px;color:#c0c0d8}
.device-meta{font-size:11px;color:#8888a8;margin-top:2px}
.device-del{color:#ef4444;font-size:12px;cursor:pointer;padding:4px 8px}
</style>
</head>
<body>
<!-- 登录/注册界面 -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-logo"><div class="auth-logo-icon">✓</div><div class="auth-logo-text">每日打卡</div></div>
    <!-- 账号密码登录表单 -->
    <div class="auth-form" id="loginForm">
      <div class="auth-title">登录</div>
      <div class="auth-field"><label>用户名</label><input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username"></div>
      <div class="auth-field"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"></div>
      <div class="auth-error" id="loginError"></div>
      <button class="auth-btn auth-btn-primary" id="loginBtn">登录</button>
      <div class="auth-divider"><div class="auth-divider-line"></div><span class="auth-divider-text">其他方式</span><div class="auth-divider-line"></div></div>
      <button class="auth-btn auth-btn-secondary" id="showEmailLogin" style="color:#a78bfa;border:1px solid rgba(167,139,250,.3);border-radius:14px;margin-top:0">📧 邮箱验证码登录</button>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="auth-btn auth-btn-secondary" id="showForgot" style="flex:1;margin-top:0;font-size:13px">忘记密码？</button>
        <button class="auth-btn auth-btn-secondary" id="showRegister" style="flex:1;margin-top:0;font-size:13px">注册账号</button>
      </div>
    </div>
    <!-- 两步验证码表单（密码登录后跳到此步） -->
    <div class="auth-form" id="twoFaForm" style="display:none">
      <div class="auth-title">🔐 两步验证</div>
      <div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:12px 14px;margin-bottom:16px">
        <div style="font-size:13px;color:#a0a0c8;line-height:1.6">验证码已发送至</div>
        <div style="font-size:15px;color:#a78bfa;font-weight:600;margin-top:2px" id="tfaEmailHint"></div>
      </div>
      <div class="auth-field"><label>验证码</label><input type="text" id="tfaCode" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code" inputmode="numeric"></div>
      <div class="auth-error" id="tfaError"></div>
      <button class="auth-btn auth-btn-primary" id="tfaVerifyBtn">验证并登录</button>
      <button class="auth-btn auth-btn-secondary" id="tfaResendBtn" style="color:#a78bfa;margin-top:4px">重新发送验证码</button>
      <button class="auth-btn auth-btn-secondary" id="tfaBack" style="margin-top:4px;font-size:13px">← 重新输入密码</button>
    </div>
    <!-- 邮箱验证码登录表单 -->
    <div class="auth-form" id="emailLoginForm" style="display:none">
      <div class="auth-title">邮箱登录</div>
      <div class="auth-field">
        <label>邮箱地址</label>
        <div class="auth-code-row">
          <input type="email" id="elEmail" placeholder="请输入绑定的邮箱" autocomplete="email">
          <button class="auth-code-btn" id="elSendBtn">发送验证码</button>
        </div>
      </div>
      <div class="auth-field"><label>验证码</label><input type="text" id="elCode" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code"></div>
      <div class="auth-error" id="elError"></div>
      <button class="auth-btn auth-btn-primary" id="elLoginBtn">验证码登录</button>
      <button class="auth-btn auth-btn-secondary" id="elBack">← 返回账号登录</button>
    </div>
    <!-- 找回密码表单 -->
    <div class="auth-form" id="forgotForm" style="display:none">
      <div class="auth-title">找回密码</div>
      <div class="auth-field">
        <label>绑定的邮箱</label>
        <div class="auth-code-row">
          <input type="email" id="fpEmail" placeholder="请输入绑定的邮箱" autocomplete="email">
          <button class="auth-code-btn" id="fpSendBtn">发送验证码</button>
        </div>
      </div>
      <div class="auth-field"><label>验证码</label><input type="text" id="fpCode" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code"></div>
      <div class="auth-field"><label>新密码</label><input type="password" id="fpNewPass" placeholder="至少6个字符" autocomplete="new-password"></div>
      <div class="auth-field"><label>确认新密码</label><input type="password" id="fpNewPass2" placeholder="再次输入新密码" autocomplete="new-password"></div>
      <div class="auth-error" id="fpError"></div>
      <button class="auth-btn auth-btn-primary" id="fpSubmitBtn">重置密码</button>
      <button class="auth-btn auth-btn-secondary" id="fpBack">← 返回登录</button>
    </div>
    <!-- 注册表单 -->
    <div class="auth-form" id="registerForm" style="display:none">
      <div class="auth-title">注册</div>
      <div class="auth-field"><label>用户名</label><input type="text" id="regUser" placeholder="2-20个字符" autocomplete="username"></div>
      <div class="auth-field"><label>密码</label><input type="password" id="regPass" placeholder="至少6个字符" autocomplete="new-password"></div>
      <div class="auth-field"><label>确认密码</label><input type="password" id="regPass2" placeholder="再次输入密码" autocomplete="new-password"></div>
      <div class="auth-field"><label>邮箱 <span style="color:#ef4444">*</span> <span style="color:#555570;font-weight:400">（用于两步验证和找回密码）</span></label><input type="email" id="regEmail" placeholder="请输入邮箱（必填）" autocomplete="email"></div>
      <div class="auth-error" id="regError"></div>
      <button class="auth-btn auth-btn-primary" id="regBtn">注册</button>
      <button class="auth-btn auth-btn-secondary" id="showLogin">已有账号？登录</button>
    </div>
    <!-- 待审批状态 -->
    <div id="pendingScreen" style="display:none">
      <div class="auth-form">
        <div class="auth-pending">
          <div class="auth-pending-icon">⏳</div>
          <div class="auth-pending-title">等待审批</div>
          <div class="auth-pending-desc">你的账号已注册成功<br>请等待管理员批准后即可使用</div>
        </div>
        <button class="auth-btn auth-btn-secondary" id="pendingRefresh">刷新状态</button>
        <button class="auth-btn auth-btn-secondary" id="pendingLogout" style="color:#ef4444">退出登录</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hdr"><div class="hdr-in"><span class="logo">每日打卡</span><div class="dt-row"><button class="user-menu-btn" id="userMenuBtn" type="button">👤</button><input type="date" id="pD"><input type="time" id="pT" step="60"></div></div></div>

  <div class="ic"><div class="il">🍲 晚餐</div><div class="ir"><div class="pw" id="w2"><input type="number" inputmode="decimal" pattern="[0-9]*" placeholder="¥ 价格" id="dinnerPrice"><span class="pu">元</span></div><div class="fd-wrap"><input class="fd" type="text" placeholder="吃了什么" id="dinnerFood"><span class="fd-clear" data-for="dinnerFood" data-tags="dnTags">✕</span></div></div><div class="qk-home-row"><label class="qk-home-label"><input type="checkbox" id="dinnerHome" class="qk-home-cb"><span class="qk-home-tag">🏠 在家吃</span></label></div><div class="qk-tags" id="dnTags"><span class="qk-tag" data-v="米饭">米饭</span><span class="qk-tag" data-v="鸡肉">鸡肉</span><span class="qk-tag" data-v="猪肉">猪肉</span><span class="qk-tag" data-v="牛肉">牛肉</span><span class="qk-tag" data-v="鱼肉">鱼肉</span><span class="qk-tag" data-v="米粉">米粉</span><span class="qk-tag" data-v="米线">米线</span><span class="qk-tag" data-v="面线">面线</span><span class="qk-tag" data-v="面条">面条</span><span class="qk-tag" data-v="麻辣烫">麻辣烫</span><span class="qk-manage-btn" id="mgrDn" data-manage="dnTags">设置</span></div></div>

  <div class="cg"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">洗澡</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">洗头</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">洗脚</span></div></label></div>
  <label><input type="checkbox" class="chk"><div class="rw"><div class="bx"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="tx">睡前刷牙</span></div></label>
  <div class="cg cg2"><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">脸部擦药</span></div></label><label class="cw"><input type="checkbox" class="chk"><div class="cf"><div class="cm"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"></polyline></svg></div><span class="ct">手部擦药</span></div></label></div>

  <div class="shd"><div class="sico" style="background:rgba(245,158,11,.15)">👑</div><div class="stt">用户管理</div></div>
  <div class="stk">
    <div class="ic">

<div class="bot" id="botBar"><div class="bi"><button class="bn bs" id="btnR" type="button">↺ 重置</button><button class="bn bp" id="btnS" type="button">📸 生成截图</button></div></div>
<script>
(function(){
  function pad(n){return n<10?'0'+n:''+n;}
  function ge(id){return document.getElementById(id);}
  var now=new Date();
  ge('pD').value=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  ge('pT').value=pad(now.getHours())+':'+pad(now.getMinutes());
  function getCurDT(){var d=ge('pD').value,t=ge('pT').value;if(d&&t)return new Date(d+'T'+t);return new Date();}
  var tbs=[ge('t0'),ge('t1'),ge('t2'),ge('t3'),ge('t4')],pns=[ge('s0'),ge('s1'),ge('s2'),ge('s3'),ge('s4')],tcls=['am','pm','em','ht','ht'];

  // Tab切换：用position:absolute移出屏幕（不是display:none）
  function doTab(idx){
    for(var i=0;i<5;i++){tbs[i].className='tbtn';pns[i].className='pnl';}
    tbs[idx].className='tbtn '+tcls[idx];pns[idx].className='pnl vis';
    // 历史(3)和管理(4)面板隐藏底部按钮
    ge('botBar').style.display=(idx>=3)?'none':'';
    if(idx===3)loadHistory();
    if(idx===4)loadAdminUsers();
  }
  tbs[0].onclick=function(){doTab(0);};tbs[1].onclick=function(){doTab(1);};tbs[2].onclick=function(){doTab(2);};tbs[3].onclick=function(){doTab(3);};tbs[4].onclick=function(){doTab(4);};

  var chks=document.querySelectorAll('.chk');
  function updP(){var total=chks.length,done=0;for(var i=0;i<total;i++){if(chks[i].checked)done++;}var pct=total>0?Math.round(done/total*100):0;ge('pf').style.width=pct+'%';ge('pl').textContent='已完成 '+done+'/'+total+' 项';ge('pp').textContent=pct+'%';}
  for(var i=0;i<chks.length;i++){chks[i].onchange=function(){updP();sav();};}
  function spw(iid,wid){var inp=ge(iid),w=ge(wid);function u(){w.className=inp.value?'pw hv':'pw';}inp.oninput=function(){u();sav();};inp.onchange=function(){u();sav();};u();}

  // ══ fdata 内存对象：每个input变化时立即存入 ══
  var fdata={};
  var fids=['wakeTime','sleepTime','breakfastPrice','breakfastFood','lunchPrice','lunchFood','dinnerPrice','dinnerFood','breakfastHome','lunchHome','dinnerHome'];
  function skey(){var d=getCurDT();return 'dk_'+d.getFullYear()+'_'+(d.getMonth()+1)+'_'+d.getDate();}

  // 给每个字段绑定事件，变化时写入fdata
  function bindField(id){
    var el=ge(id);
    if(!el)return;
    if(el.type==='checkbox'){
      function upc(){fdata[id]=el.checked?'1':'';sav();}
      el.onchange=upc;
    }else{
      function up(){fdata[id]=el.value;sav();}
      el.onchange=up;
      el.oninput=up;
      el.onblur=up;
    }
  }
  for(var i=0;i<fids.length;i++) bindField(fids[i]);

  // 保存：合并写入，从fdata读（不从input读，避免隐藏input值丢失）
  function sav(){
    try{
      var o={c:[],f:{}};
      for(var j=0;j<chks.length;j++)o.c.push(chks[j].checked);
      for(var k in fdata){if(fdata[k])o.f[k]=fdata[k];}
      localStorage.setItem(skey(),JSON.stringify(o));
    }catch(e){}
  }

  // 加载：恢复到input和fdata
  function ld(){
    try{var raw=localStorage.getItem(skey());if(!raw)return;var o=JSON.parse(raw);
    if(o.c){for(var j=0;j<chks.length&&j<o.c.length;j++)chks[j].checked=!!o.c[j];}
    if(o.f){for(var j=0;j<fids.length;j++){var v=o.f[fids[j]];if(v){var el=ge(fids[j]);if(el){if(el.type==='checkbox'){el.checked=v==='1';} else {el.value=v;} fdata[fids[j]]=v;}}}}
    updP();}catch(e){}
  }

  function toast(m){var t=ge('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},2000);}

  function doReset(){
    for(var j=0;j<chks.length;j++)chks[j].checked=false;
    for(var j=0;j<fids.length;j++){var el=ge(fids[j]);if(el){if(el.type==='checkbox'){el.checked=false;}else{el.value='';}}}
    fdata={};
    document.querySelectorAll('.qk-tag.sel').forEach(function(t){t.classList.remove('sel');});
    // 重置快速标签的点击顺序
    ['bfTags','lcTags','dnTags'].forEach(function(tid){var c=ge(tid);if(c&&c._qkReset)c._qkReset();});
    try{localStorage.removeItem(skey());}catch(e){}
    updP();spw('breakfastPrice','w0');spw('lunchPrice','w1');spw('dinnerPrice','w2');
  }
  ge('btnR').onclick=function(){
    if(!confirm('确定要重置所有打卡记录吗？'))return;
    doReset();
    toast('已重置 ✓');
  };

  // ══ 截图：从fdata读取（始终可靠）══
  ge('btnS').onclick=function(){
    // 再从localStorage兜底一次
    try{var raw=localStorage.getItem(skey());if(raw){var st=JSON.parse(raw);if(st.f){for(var k in st.f){if(st.f[k]&&!fdata[k])fdata[k]=st.f[k];}}}}catch(e){}

    var wake=fdata.wakeTime||'';
    var sleep=fdata.sleepTime||'';
    var bP=fdata.breakfastPrice||'',bF=fdata.breakfastFood||'未记录';
    var lP=fdata.lunchPrice||'',lF=fdata.lunchFood||'未记录';
    var dP=fdata.dinnerPrice||'',dF=fdata.dinnerFood||'未记录';
    if(fdata.breakfastHome==='1')bF='🏠'+bF;
    if(fdata.lunchHome==='1')lF='🏠'+lF;
    if(fdata.dinnerHome==='1')dF='🏠'+dF;
    var spend=(parseFloat(bP)||0)+(parseFloat(lP)||0)+(parseFloat(dP)||0);

    var total=chks.length,done=0;
    for(var i=0;i<total;i++){if(chks[i].checked)done++;}
    var pct=total>0?Math.round(done/total*100):0;
    var dt=getCurDT(),wks=['日','一','二','三','四','五','六'];
    var ds=dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日 周'+wks[dt.getDay()]+' '+pad(dt.getHours())+':'+pad(dt.getMinutes());

    function col(sid){var s=ge(sid),lbs=s.querySelectorAll('label'),arr=[];for(var k=0;k<lbs.length;k++){var cb=lbs[k].querySelector('.chk');var tx=lbs[k].querySelector('.tx')||lbs[k].querySelector('.ct');if(cb&&tx)arr.push({t:tx.textContent,ok:cb.checked});}return arr;}
    function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

    var SC=4,LW=390*SC,LM=20*SC,RM=20*SC,CW=LW-LM-RM;
    var cv=document.createElement('canvas');cv.width=LW;
    var ctx=cv.getContext('2d');
    var fn=function(sz,wt){return(wt||'500')+' '+(sz*SC)+'px -apple-system,"PingFang SC",sans-serif';};
    var S=function(v){return v*SC;};
    var reasons=fdata._reasons||{};
    var secData=[
      {tt:'🌅 早上',time:wake?'起床 '+wake:'',cl:'#f59e0b',me:'🍳',ml:'早餐',mp:bP,mf:bF,it:col('s0'),reason:reasons.morning},
      {tt:'🌞 中午',time:'',cl:'#06b6d4',me:'🍜',ml:'午餐',mp:lP,mf:lF,it:col('s1'),reason:reasons.noon},
      {tt:'🌙 晚上',time:sleep?'就寝 '+sleep:'',cl:'#8b5cf6',me:'🍲',ml:'晚餐',mp:dP,mf:dF,it:col('s2'),reason:reasons.evening}
    ];
    function draw(measure){
      var cy=S(28);
      if(!measure){ctx.font=fn(20,'900');ctx.fillStyle='#c084fc';ctx.textAlign='center';ctx.fillText('每日打卡汇报',LW/2,cy);}
      cy+=S(22);
      if(!measure){ctx.font=fn(11);ctx.fillStyle='#8888a8';ctx.fillText(ds,LW/2,cy);}
      cy+=S(26);
      var cardH=S(62);
      if(!measure){
        ctx.fillStyle='#1c1c2e';rr(ctx,LM,cy,CW,cardH,S(7));ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=SC*0.5;rr(ctx,LM,cy,CW,cardH,S(7));ctx.stroke();
        ctx.font=fn(9);ctx.fillStyle='#8888a8';ctx.textAlign='center';ctx.fillText('今日完成度',LW/2,cy+S(16));
        var bx=LM+S(16),bw=CW-S(32),barY=cy+S(24);
        ctx.fillStyle='rgba(255,255,255,0.06)';rr(ctx,bx,barY,bw,S(4),S(2));ctx.fill();
        if(pct>0){var grd=ctx.createLinearGradient(bx,0,bx+bw,0);grd.addColorStop(0,'#f59e0b');grd.addColorStop(.5,'#06b6d4');grd.addColorStop(1,'#8b5cf6');ctx.fillStyle=grd;rr(ctx,bx,barY,bw*pct/100,S(4),S(2));ctx.fill();}
        ctx.font=fn(22,'900');ctx.fillStyle='#a78bfa';ctx.fillText(pct+'%',LW/2,cy+S(46));
        ctx.font=fn(9);ctx.fillStyle='#555570';ctx.fillText(done+'/'+total+' 项 · 餐饮消费 ¥'+spend.toFixed(0),LW/2,cy+S(57));
      }
      cy+=cardH+S(28);
      for(var si=0;si<secData.length;si++){
        var s=secData[si];
        if(si>0){var ly=cy-S(14);if(!measure){ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.5;ctx.setLineDash([S(4),S(4)]);ctx.beginPath();ctx.moveTo(LM,ly);ctx.lineTo(LW-RM,ly);ctx.stroke();ctx.setLineDash([]);}}
        if(!measure){ctx.textAlign='left';ctx.font=fn(14,'700');ctx.fillStyle=s.cl;var ttx=s.tt;if(s.time)ttx+=' · '+s.time;ctx.fillText(ttx,LM,cy);}
        cy+=S(10);
        if(!measure){ctx.textAlign='left';ctx.font=fn(11);ctx.fillStyle='#e8e8f0';var mt=s.me+' '+s.ml+': '+s.mf;ctx.fillText(mt,LM,cy+S(11));if(s.mp){var bw2=ctx.measureText(mt+'  ').width;ctx.fillStyle='#f59e0b';ctx.font=fn(11,'700');ctx.fillText('¥'+s.mp,LM+bw2,cy+S(11));}}
        cy+=S(22);
        var tagX=LM;ctx.font=fn(10);
        for(var j=0;j<s.it.length;j++){
          var it=s.it[j],lb=(it.ok?'✓ ':'○ ')+it.t;ctx.font=fn(10);
          var tw=ctx.measureText(lb).width+S(12);
          if(tagX+tw>LW-RM){tagX=LM;cy+=S(20);}
          if(!measure){ctx.fillStyle=it.ok?'rgba(99,102,241,0.15)':'rgba(255,255,255,0.04)';rr(ctx,tagX,cy,tw,S(15),S(4));ctx.fill();ctx.strokeStyle=it.ok?'rgba(99,102,241,0.3)':'rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.4;rr(ctx,tagX,cy,tw,S(15),S(4));ctx.stroke();ctx.fillStyle=it.ok?'#a5b4fc':'#555570';ctx.font=fn(10);ctx.fillText(lb,tagX+S(6),cy+S(11));}
          tagX+=tw+S(5);
        }
        cy+=S(30);
        // 绘制未完成原因（仅显示原因，未完成项看标签即可）
        if(s.reason&&s.reason.reason){
          if(!measure){
            ctx.textAlign='left';ctx.fillStyle='#f59e0b';ctx.font=fn(10);
            ctx.fillText('💬 原因: '+s.reason.reason,LM,cy);
          }
          cy+=S(18);
        }
        cy+=S(16);// 时段间增加间距
      }
      cy-=S(10);
      if(!measure){ctx.textAlign='center';ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=SC*0.4;ctx.beginPath();ctx.moveTo(LM,cy);ctx.lineTo(LW-RM,cy);ctx.stroke();cy+=S(16);ctx.font=fn(9);ctx.fillStyle='#555570';ctx.fillText('每日打卡汇报 · '+ds,LW/2,cy);}
      else{cy+=S(20);}
      return cy;
    }
    var totalH=draw(true);cv.height=totalH;ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,LW,totalH);draw(false);
    try{var url=cv.toDataURL('image/png');showPreview(url,(dt.getMonth()+1)+'月'+dt.getDate()+'日');toast('将在10分钟后自动重置');if(window._resetTimer)clearTimeout(window._resetTimer);window._resetTimer=setTimeout(function(){doReset();toast('已自动重置 ✓');},10*60*1000);}catch(e){toast('截图失败: '+e.message);}
  };

  // ══ 截图预览弹窗 ══
  function showPreview(dataUrl,dateLabel){
    // 创建遮罩
    var mask=document.createElement('div');
    mask.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:300;display:flex;flex-direction:column;align-items:center;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch;';

    // 提示文字
    var tip=document.createElement('div');
    tip.style.cssText='color:#8888a8;font-size:13px;margin-bottom:12px;text-align:center;';
    tip.textContent='💡 长按图片可保存到相册';
    mask.appendChild(tip);

    // 图片
    var img=document.createElement('img');
    img.src=dataUrl;
    img.style.cssText='width:100%;max-width:390px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);';
    mask.appendChild(img);

    // 按钮区
    var btns=document.createElement('div');
    btns.style.cssText='display:flex;gap:10px;margin-top:16px;width:100%;max-width:390px;';

    // 分享按钮
    var shareBtn=document.createElement('button');
    shareBtn.textContent='📤 分享到其它APP / 保存到相册';
    shareBtn.style.cssText='flex:1;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;font-family:inherit;-webkit-appearance:none;';
    shareBtn.onclick=function(){
      try{
        var arr=dataUrl.split(','),mime=arr[0].match(/:(.*?);/)[1];
        var bstr=atob(arr[1]),n=bstr.length,u8=new Uint8Array(n);
        while(n--)u8[n]=bstr.charCodeAt(n);
        var blob=new Blob([u8],{type:mime});
        var file=new File([blob],'每日汇报_'+dateLabel+'.png',{type:'image/png'});
        if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:'每日打卡汇报'}).then(function(){
            toast('分享成功 ✓');
          }).catch(function(err){if(err.name!=='AbortError') toast('分享取消');});
        }else{toast('请长按图片保存后再分享');}
      }catch(e){toast('请长按图片保存后再分享');}
    };
    btns.appendChild(shareBtn);
    mask.appendChild(btns);

    // 关闭按钮
    var closeBtn=document.createElement('button');
    closeBtn.textContent='✕ 关闭';
    closeBtn.style.cssText='margin-top:12px;padding:10px 30px;border:none;border-radius:10px;background:transparent;color:#555570;font-size:14px;font-family:inherit;-webkit-appearance:none;';
    closeBtn.onclick=function(){document.body.removeChild(mask);};
    mask.appendChild(closeBtn);

    document.body.appendChild(mask);
  }

  // ══ 起床/就寝时间默认值（原生time控件打开时的默认值）══
  (function(){
    var wt=ge('wakeTime'),st=ge('sleepTime');
    function alwaysDefault(el,def){
      function h(){if(!el.value){el.value=def;el.dispatchEvent(new Event('input'));}}
      el.addEventListener('mousedown',h);
      el.addEventListener('touchstart',h);
    }
    alwaysDefault(wt,'07:15');
    alwaysDefault(st,'22:15');
  })();

  // ══ 快速食物标签（先点的在前，后点的在后）══
  function initQkTags(containerId,foodInputId){
    var c=ge(containerId);if(!c)return;
    var inp=ge(foodInputId);
    var tags=c.querySelectorAll('.qk-tag');
    var order=[];// 记录点击顺序
    function rebuildValue(){
      var parts=[];
      for(var j=0;j<order.length;j++)parts.push(order[j]);
      inp.value=parts.join('+');
      fdata[foodInputId]=inp.value;

        // 快速原因按钮（使用该时段专属选项，允许多选）
        var qk=document.createElement('div');qk.className='reason-qk';
        var inp=document.createElement('input');inp.className='reason-input';inp.placeholder='或自定义原因...';
        var quickReasons=sec.qk;
        function updateReasonFromQk(secKey,secItems,qkDiv,inpEl){
          var selBtns=qkDiv.querySelectorAll('.reason-qk-btn.sel'),arr=[];
          for(var x=0;x<selBtns.length;x++)arr.push(selBtns[x].textContent);
          var combined=arr.join('+');
          inpEl.value=combined;
          reasonData[secKey]={reason:combined,items:secItems};
        }
        for(var q=0;q<quickReasons.length;q++){
          (function(reason,secKey,secItems,qkDiv,inpEl){
            var btn=document.createElement('span');btn.className='reason-qk-btn';btn.textContent=reason;
            btn.onclick=function(){
              btn.classList.toggle('sel');
              updateReasonFromQk(secKey,secItems,qkDiv,inpEl);
            };
            qkDiv.appendChild(btn);
          })(quickReasons[q],sec.key,sec.items,qk,inp);
        }
        secDiv.appendChild(qk);
        inp.oninput=function(){
          reasonData[sec.key]={reason:inp.value,items:sec.items};
          var sibs=qk.querySelectorAll('.reason-qk-btn');

  var API_BASE='https://daily-checkin.daily-checkin.workers.dev';
  var SESSION_TOKEN='';
  var CURRENT_USER=null;

  function apiCall(method,path,body){
    if(!API_BASE)return Promise.resolve(null);
    var opts={method:method,headers:{'Content-Type':'application/json'}};
    if(SESSION_TOKEN)opts.headers['Authorization']='Bearer '+SESSION_TOKEN;
    if(body)opts.body=JSON.stringify(body);
    return fetch(API_BASE+path,opts).then(function(r){
      if(r.status===401){
        // 会话过期，回到登录页
        SESSION_TOKEN='';CURRENT_USER=null;
        try{localStorage.removeItem('session_token');}catch(e){}
        showAuthScreen();
        return null;
      }
      return r.json();
    }).catch(function(e){
      console.error('API错误:',e);
      toast('网络错误，请检查连接');
      return null;
    });
  }

  // 页面加载时尝试恢复会话
  (function(){
    // 先尝试设备token
    var dt=null;
    try{dt=localStorage.getItem('device_token');}catch(e){}
    var st=null;
    try{st=localStorage.getItem('session_token');}catch(e){}

    if(st){
      SESSION_TOKEN=st;
      apiCall('GET','/api/auth/me').then(function(res){
        if(res&&res.user){
          CURRENT_USER=res.user;
          if(res.user.status==='approved')onLoginSuccess();
          else{showAuthScreen();showPendingScreen();}
        }else if(dt){
          // session过期，尝试设备token
          loginWithDevice(dt);
        }else{
          showAuthScreen();
        }
      });
    }else if(dt){
      loginWithDevice(dt);
    }else{
      showAuthScreen();
    }

    function loginWithDevice(token){
      apiCall('POST','/api/auth/device-login',{device_token:token}).then(function(res){
        if(res&&res.token){
          SESSION_TOKEN=res.token;CURRENT_USER=res.user;
          try{localStorage.setItem('session_token',res.token);}catch(e){}
          if(res.user.status==='approved')onLoginSuccess(false); // 设备token登录 = 已信任设备
          else{showAuthScreen();showPendingScreen();}
        }else{
          try{localStorage.removeItem('device_token');}catch(e){}
          showAuthScreen();
        }
      });
    }
  })();

  // ══ 管理员查看用户打卡记录弹窗 ══
  function showAdminUserData(userId,username){
    var mask=document.createElement('div');mask.className='detail-mask';
    var box=document.createElement('div');box.className='detail-box';
    box.style.maxHeight='90vh';

    // 范围选择
    var html='<div class="detail-title">📊 '+username+' 的打卡记录</div>';
    html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
    html+='<button class="hq-btn hq-sel" data-ar="week">本周</button>';
    html+='<button class="hq-btn" data-ar="month">本月</button>';
    html+='<button class="hq-btn" data-ar="quarter">本季</button>';
    html+='<button class="hq-btn" data-ar="year">本年</button>';
    html+='</div>';
    html+='<div id="adStatsBox"></div>';
    html+='<div id="adListBox" style="margin-top:10px"></div>';
    html+='<button class="manage-close" id="adClose" style="margin-top:12px">关闭</button>';
    box.innerHTML=html;
    mask.appendChild(box);document.body.appendChild(mask);
    mask.onclick=function(e){if(e.target===mask)document.body.removeChild(mask);};
    box.querySelector('#adClose').onclick=function(){document.body.removeChild(mask);};

    function loadRange(range){
      var now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
      var day=now.getDay()||7;
      var from,to;
      if(range==='week'){from=new Date(y,m,d-day+1);to=new Date(y,m,d-day+7);}
      else if(range==='month'){from=new Date(y,m,1);to=new Date(y,m+1,0);}
      else if(range==='quarter'){var q=Math.floor(m/3)*3;from=new Date(y,q,1);to=new Date(y,q+3,0);}
      else{from=new Date(y,0,1);to=new Date(y,11,31);}
      function fmt(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
      var f=fmt(from),t=fmt(to);

      box.querySelector('#adStatsBox').innerHTML='<div class="h-loading">加载中...</div>';
      box.querySelector('#adListBox').innerHTML='';

      Promise.all([
        apiCall('GET','/api/admin/checkin/stats?user_id='+userId+'&from='+f+'&to='+t),
        apiCall('GET','/api/admin/checkin/range?user_id='+userId+'&from='+f+'&to='+t)
      ]).then(function(arr){
        var stats=arr[0],range=arr[1];
        // 渲染统计
        if(stats){
          var pctColor=(stats.avg_pct||0)>=80?'#22c55e':(stats.avg_pct||0)>=50?'#f59e0b':'#ef4444';
          box.querySelector('#adStatsBox').innerHTML=
            '<div class="h-stat-grid">'+
            '<div class="h-stat-card"><div class="h-stat-val" style="color:'+pctColor+'">'+Math.round(stats.avg_pct||0)+'%</div><div class="h-stat-lbl">平均完成率</div></div>'+
            '<div class="h-stat-card"><div class="h-stat-val">'+(stats.checked_days||0)+'/'+(stats.total_days||0)+'</div><div class="h-stat-lbl">打卡天数</div></div>'+
            '<div class="h-stat-card"><div class="h-stat-val" style="color:#f59e0b">¥'+Math.round(stats.avg_spend||0)+'</div><div class="h-stat-lbl">日均消费</div></div>'+
            '<div class="h-stat-card"><div class="h-stat-val" style="color:#f59e0b">¥'+Math.round(stats.total_spend||0)+'</div><div class="h-stat-lbl">总消费</div></div>'+
            '</div>';
        }else{
          box.querySelector('#adStatsBox').innerHTML='<div class="h-loading">加载失败</div>';
        }
        // 渲染列表
        var data=(range&&range.data)||[];
        if(!data.length){box.querySelector('#adListBox').innerHTML='<div class="h-loading">暂无记录</div>';return;}
        var wks=['日','一','二','三','四','五','六'];
        var lhtml='';
        for(var i=0;i<data.length;i++){
          var r=data[i];
          var dtt=new Date(r.date+'T00:00:00');
          var pc=r.pct>=80?'#22c55e':r.pct>=50?'#f59e0b':'#ef4444';
          lhtml+='<div class="h-day" data-adate="'+r.date+'" data-auid="'+userId+'">';
          lhtml+='<div class="h-day-top"><span class="h-day-date">'+(dtt.getMonth()+1)+'/'+dtt.getDate()+' 周'+wks[dtt.getDay()]+'</span>';
          lhtml+='<span class="h-day-pct" style="color:'+pc+'">'+r.pct+'%</span></div>';
          lhtml+='<div class="h-day-bot"><span>'+r.done+'/'+r.total+'项</span><span>¥'+Math.round(r.spend||0)+'</span></div></div>';
        }
        box.querySelector('#adListBox').innerHTML=lhtml;
        // 点击日期查看详情
        box.querySelectorAll('[data-adate]').forEach(function(el){
          el.onclick=function(){
            var dd=el.getAttribute('data-adate');
            var uu=parseInt(el.getAttribute('data-auid'));
            showAdminCheckinDetail(uu,username,dd);
          };
        });
      });
    }

    // 绑定范围按钮
    box.querySelectorAll('[data-ar]').forEach(function(btn){
      btn.onclick=function(){
        box.querySelectorAll('[data-ar]').forEach(function(b){b.classList.remove('hq-sel');});
        btn.classList.add('hq-sel');
        loadRange(btn.getAttribute('data-ar'));
      };
    });

    loadRange('week');
  }

  // ══ 管理员查看用户某日打卡详情 ══
  function showAdminCheckinDetail(userId,username,date){
    var mask2=document.createElement('div');mask2.className='detail-mask';mask2.style.zIndex='310';
    var box2=document.createElement('div');box2.className='detail-box';
    box2.innerHTML='<div class="detail-title">加载中...</div>';

    mask2.onclick=function(e){if(e.target===mask2)document.body.removeChild(mask2);};

      if(!res||!res.data){box2.querySelector('.detail-title').textContent=date+' 暂无记录';return;}
      var r=res.data;
      var dt=new Date(date+'T00:00:00');
      var wks=['日','一','二','三','四','五','六'];
      var dateLabel=username+' · '+(dt.getMonth()+1)+'月'+dt.getDate()+'日 周'+wks[dt.getDay()];
      var pctColor=r.pct>=80?'#22c55e':r.pct>=50?'#f59e0b':'#ef4444';

      var meals={};try{meals=JSON.parse(r.meals||'{}');}catch(e){}
      var checklist=[];try{checklist=JSON.parse(r.checklist||'[]');}catch(e){}
      var reasons={};try{reasons=JSON.parse(r.reasons||'{}');}catch(e){}

      // 用全局 ALL_ITEMS 映射
      var grouped={morning:[],noon:[],evening:[]};
      for(var i=0;i<ALL_ITEMS.length;i++){
        var raw=i<checklist.length?checklist[i]:false;
        grouped[ALL_ITEMS[i].sec].push({name:ALL_ITEMS[i].name,done:raw===true||raw===1});
      }

      var html='<div class="detail-title">'+dateLabel+'</div>';
      html+='<div class="detail-sub">'+(r.is_modified?'✏️ 已修改 v'+r.version:'原始记录')+'</div>';

      if(r.wake_time||r.sleep_time){
        html+='<div class="detail-time-row">';
        if(r.wake_time)html+='<div class="detail-time-chip">🌅 '+r.wake_time+'</div>';
        if(r.sleep_time)html+='<div class="detail-time-chip">😴 '+r.sleep_time+'</div>';
        html+='</div>';
      }

      html+='<div class="detail-summary">';
      html+='<div class="detail-summary-card"><div class="detail-summary-val" style="color:'+pctColor+'">'+r.pct+'%</div><div class="detail-summary-lbl">完成率</div></div>';
      html+='<div class="detail-summary-card"><div class="detail-summary-val">'+r.done+'/'+r.total+'</div><div class="detail-summary-lbl">完成项</div></div>';
      html+='<div class="detail-summary-card"><div class="detail-summary-val" style="color:#f59e0b">¥'+Math.round(r.spend||0)+'</div><div class="detail-summary-lbl">消费</div></div>';
      html+='</div>';

      var secColors=['#f59e0b','#06b6d4','#8b5cf6'];
      var secLabels=['🌅 早上','🌞 中午','🌙 晚上'];
      var secKeys=['morning','noon','evening'];
      var mealKeys=['breakfast','lunch','dinner'];
      var mealIcons=['🍳','🍜','🍲'];
      var mealNms=['早餐','午餐','晚餐'];

      for(var si=0;si<3;si++){
        var sk=secKeys[si];
        html+='<div class="detail-sec"><div class="detail-sec-hd" style="color:'+secColors[si]+'">'+secLabels[si]+'</div>';
        var meal=meals[mealKeys[si]];
        if(meal&&(meal.food||meal.price)){
          var ft=meal.food||'未记录';if(meal.home)ft='🏠 '+ft;
          html+='<div class="detail-meal"><span class="detail-meal-icon">'+mealIcons[si]+'</span><span class="detail-meal-info">'+mealNms[si]+': '+ft+'</span>';
          if(meal.price)html+='<span class="detail-meal-price">¥'+meal.price+'</span>';
          html+='</div>';
        }
        html+='<div class="detail-tags">';
        var items=grouped[sk];
        if(!items.length||checklist.length===0){
          html+='<span style="font-size:12px;color:#555570;padding:4px 0;display:block">⚠️ 该记录的打卡明细数据缺失（旧版本数据）</span>';
        }else{

        }
        html+='</div>';
        var sr=reasons[sk];

  // ══ 收集当前页面数据为 API 提交格式 ══
  function collectData(){
    var d=ge('pD').value;
    var cl=[];for(var j=0;j<chks.length;j++)cl.push(chks[j].checked);
    var meals={
      breakfast:{price:fdata.breakfastPrice||'',food:fdata.breakfastFood||'',home:fdata.breakfastHome==='1'},
      lunch:{price:fdata.lunchPrice||'',food:fdata.lunchFood||'',home:fdata.lunchHome==='1'},
      dinner:{price:fdata.dinnerPrice||'',food:fdata.dinnerFood||'',home:fdata.dinnerHome==='1'}
    };
    var bP=parseFloat(fdata.breakfastPrice)||0,lP=parseFloat(fdata.lunchPrice)||0,dP=parseFloat(fdata.dinnerPrice)||0;
    var total=chks.length,dn=0;for(var j=0;j<total;j++){if(chks[j].checked)dn++;}
    var reasons=fdata._reasons||{};
    return {
      date:d,wake_time:fdata.wakeTime||'',sleep_time:fdata.sleepTime||'',
      checklist:JSON.stringify(cl),meals:JSON.stringify(meals),reasons:JSON.stringify(reasons),
      total:total,done:dn,pct:total>0?Math.round(dn/total*100):0,spend:bP+lP+dP
    };
  }

  // ══ 截图后同步到云端 ══
  function syncToCloud(editReason){
    var data=collectData();
    if(editReason)data.edit_reason=editReason;
    apiCall('POST','/api/checkin',data).then(function(res){
      if(res&&res.ok){
        if(res.logged)toast('已保存并记录修改日志 ✓');
        else toast('已保存到云端 ✓');
      }
    });
  }

  // ══ 从云端加载当日数据 ══
  function loadFromCloud(){
    var d=ge('pD').value;
    if(!API_BASE||!d)return;
    apiCall('GET','/api/checkin?date='+d).then(function(res){
      if(!res||!res.data)return;
      var r=res.data;
      // 恢复 checklist
      try{
        var cl=JSON.parse(r.checklist||'[]');
        for(var j=0;j<chks.length&&j<cl.length;j++)chks[j].checked=!!cl[j];
      }catch(e){}
      // 恢复字段
      if(r.wake_time){ge('wakeTime').value=r.wake_time;fdata.wakeTime=r.wake_time;}
      if(r.sleep_time){ge('sleepTime').value=r.sleep_time;fdata.sleepTime=r.sleep_time;}
      // 恢复餐饮
      try{
        var m=JSON.parse(r.meals||'{}');
        if(m.breakfast){
          if(m.breakfast.price){ge('breakfastPrice').value=m.breakfast.price;fdata.breakfastPrice=m.breakfast.price;}
          if(m.breakfast.food){ge('breakfastFood').value=m.breakfast.food;fdata.breakfastFood=m.breakfast.food;}
          if(m.breakfast.home){ge('breakfastHome').checked=true;fdata.breakfastHome='1';}
        }
        if(m.lunch){
          if(m.lunch.price){ge('lunchPrice').value=m.lunch.price;fdata.lunchPrice=m.lunch.price;}
          if(m.lunch.food){ge('lunchFood').value=m.lunch.food;fdata.lunchFood=m.lunch.food;}
          if(m.lunch.home){ge('lunchHome').checked=true;fdata.lunchHome='1';}
        }
        if(m.dinner){
          if(m.dinner.price){ge('dinnerPrice').value=m.dinner.price;fdata.dinnerPrice=m.dinner.price;}
          if(m.dinner.food){ge('dinnerFood').value=m.dinner.food;fdata.dinnerFood=m.dinner.food;}
          if(m.dinner.home){ge('dinnerHome').checked=true;fdata.dinnerHome='1';}
        }
      }catch(e){}
      // 恢复 reasons
      try{var rs=JSON.parse(r.reasons||'{}');if(rs&&Object.keys(rs).length)fdata._reasons=rs;}catch(e){}
      updP();spw('breakfastPrice','w0');spw('lunchPrice','w1');spw('dinnerPrice','w2');

  // ══ 判断是否在修改历史记录 ══
  function isEditingHistory(){
    var d=ge('pD').value;if(!d)return false;
    // 简化逻辑：获取当前UTC+8日期字符串，与打卡日期比较
    var now=new Date();
    var utc8Now=new Date(now.getTime()+(8-now.getTimezoneOffset()/60)*60*60*1000);
    var todayStr=utc8Now.getFullYear()+'-'+
      String(utc8Now.getMonth()+1).padStart(2,'0')+'-'+
      String(utc8Now.getDate()).padStart(2,'0');
    
    return todayStr>d; // 如果今天日期 > 打卡日期，说明是隔天修改
  }

  // ══ 历史面板逻辑 ══
  var hRange='week';
  function getDateRange(range){
    var now=new Date(),y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
    var day=now.getDay()||7;// 周一=1
    var from,to;
    if(range==='week'){from=new Date(y,m,d-day+1);to=new Date(y,m,d-day+7);}
    else if(range==='month'){from=new Date(y,m,1);to=new Date(y,m+1,0);}
    else if(range==='quarter'){var q=Math.floor(m/3)*3;from=new Date(y,q,1);to=new Date(y,q+3,0);}
    else{from=new Date(y,0,1);to=new Date(y,11,31);}
    return {from:fmt(from),to:fmt(to)};
    function fmt(dt){return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
  }

      html+='</div>';

      var secColors=['#f59e0b','#06b6d4','#8b5cf6'];
      var secLabels=['🌅 早上','🌞 中午','🌙 晚上'];
      var secKeys=['morning','noon','evening'];
      var mealKeys=['breakfast','lunch','dinner'];
      var mealIcons=['🍳','🍜','🍲'];
      var mealNames=['早餐','午餐','晚餐'];

      for(var si=0;si<3;si++){
        var sk=secKeys[si];
        html+='<div class="detail-sec">';
        html+='<div class="detail-sec-hd" style="color:'+secColors[si]+'">'+secLabels[si]+'</div>';

        var meal=meals[mealKeys[si]];
        if(meal&&(meal.food||meal.price)){
          var foodTxt=meal.food||'未记录';
          if(meal.home)foodTxt='🏠 '+foodTxt;
          html+='<div class="detail-meal"><span class="detail-meal-icon">'+mealIcons[si]+'</span><span class="detail-meal-info">'+mealNames[si]+': '+foodTxt+'</span>';
          if(meal.price)html+='<span class="detail-meal-price">¥'+meal.price+'</span>';
          html+='</div>';
        }

        var items=grouped[sk];
        html+='<div class="detail-tags">';
        if(checklistMissing){
          html+='<span style="font-size:12px;color:#555570;padding:4px 0;display:block">⚠️ 该记录的打卡明细数据缺失（旧版本数据），仅保留了统计数字</span>';
        }else{
          for(var j=0;j<items.length;j++){
            html+='<span class="detail-tag '+(items[j].done?'done':'undone')+'">'+(items[j].done?'✓':'○')+' '+items[j].name+'</span>';
          }
        }
        html+='</div>';

        var secReason=reasons[sk];
        // 兼容新格式 {reason:'xxx',items:[...]} 和旧格式 'xxx'（字符串）
        var reasonText='';
        if(secReason){
          if(typeof secReason==='string')reasonText=secReason;
          else if(secReason.reason)reasonText=secReason.reason;
        }
        if(reasonText)html+='<div class="detail-reason">💬 未完成原因：'+reasonText+'</div>';
        html+='</div>';
      }

      var oldContent=box.querySelector('.detail-title');
      oldContent.outerHTML=html;
    });
  }

  function calcHours(wake,sleep){
    try{
      var wp=wake.split(':'),sp=sleep.split(':');
      var wm=parseInt(wp[0])*60+parseInt(wp[1]);
      var sm=parseInt(sp[0])*60+parseInt(sp[1]);
      if(sm<=wm)sm+=24*60;
      var diff=sm-wm;
      var h=Math.floor(diff/60),m=diff%60;
      return h+'h'+pad(m)+'m';
    }catch(e){return '-';}
  }

  // 给 renderList 中的 .h-day 绑定点击查看详情（需要重写绑定逻辑）
  var _origRenderList=renderList;
  renderList=function(data){
    _origRenderList(data);
    // 绑定日期行点击
    var days=ge('hListBody').querySelectorAll('.h-day');
    for(var i=0;i<days.length;i++){
      days[i].addEventListener('click',function(){
        var d=this.getAttribute('data-date');
        if(d)showCheckinDetail(d);
      });
    }
  };

  // ══════════════════════════════════════

        html+='<div class="pwa-steps">';
        html+='<div class="pwa-step"><span class="pwa-step-num">1</span><span class="pwa-step-text">点击浏览器右上角 <span class="key">⋮ 菜单</span></span></div>';

  // ══════════════════════════════════════
  // 功能3: 快速标签管理（云端同步 + 本地缓存）
  // ══════════════════════════════════════
  var TAG_CACHE_KEY='qk_tags_cache';
  var _tagsCloud={};// 内存中的标签数据

  // 默认标签配置
  var defaultTagsConfig={
    bfTags:['包子','馒头','豆浆','油条','稀饭','鸡蛋','茶叶蛋','青菜','米粉','面线','米线','面条'],
    lcTags:['米饭','鸡肉','猪肉','牛肉','鱼肉','米粉','米线','面线','面条','麻辣烫'],
    dnTags:['米饭','鸡肉','猪肉','牛肉','鱼肉','米粉','米线','面线','面条','麻辣烫'],
    reasonMorning:['起床晚了','生病了','偷懒了','心情不好'],
    reasonNoon:['偷懒了','生病了','心情不好','不想睡','睡不着','忙着玩'],
    reasonEvening:['偷懒了','生病了','心情不好','忙着玩']
  };

  // 从本地缓存读取（秒开）
  function loadTagsCache(){
    try{
      var raw=localStorage.getItem(TAG_CACHE_KEY);
      if(raw)return JSON.parse(raw);
    }catch(e){}
    return {};
  }

  // 写入本地缓存
  function saveTagsCache(data){
    try{localStorage.setItem(TAG_CACHE_KEY,JSON.stringify(data));}catch(e){}
  }

  // 获取某个标签组的当前列表
  function getTagList(groupId){
    if(_tagsCloud[groupId])return _tagsCloud[groupId].slice();
    return defaultTagsConfig[groupId]?defaultTagsConfig[groupId].slice():[];
  }

  // 从云端加载全部标签配置
  function loadTagsFromCloud(){
    if(!API_BASE)return;
    apiCall('GET','/api/tags').then(function(res){
      if(!res||!res.data)return;
      var data=res.data;
      // 合并到内存
      for(var k in data){
        if(data[k]&&data[k].length)_tagsCloud[k]=data[k];
      }
      // 写入本地缓存
      saveTagsCache(_tagsCloud);
      // 刷新页面上的标签
      var foodGroups=[['bfTags','breakfastFood'],['lcTags','lunchFood'],['dnTags','dinnerFood']];
      for(var i=0;i<foodGroups.length;i++){
        var gid=foodGroups[i][0],fid=foodGroups[i][1];
        if(_tagsCloud[gid])rebuildFoodTags(gid,fid);
      }
    });
  }

  // 保存单组标签到云端
  function saveTagToCloud(groupId,tags){
    // 立即更新内存和本地缓存
    _tagsCloud[groupId]=tags;
    saveTagsCache(_tagsCloud);
    // 异步同步到云端
    if(!API_BASE)return;
    apiCall('POST','/api/tags',{group_id:groupId,tags:tags}).then(function(res){
      if(res&&res.ok)toast('标签已同步到云端 ✓');
      else toast('标签已保存到本地');
    });
  }

  // 重新渲染标签容器（食物类）
  function rebuildFoodTags(containerId,foodInputId){
    var c=ge(containerId);if(!c)return;
    var tags=getTagList(containerId);
    // 清空现有标签（保留管理按钮）
    var manageBtn=c.querySelector('.qk-manage-btn');
    c.innerHTML='';
    for(var i=0;i<tags.length;i++){
      var span=document.createElement('span');
      span.className='qk-tag';
      span.setAttribute('data-v',tags[i]);
      span.textContent=tags[i];
      c.appendChild(span);
    }
    if(manageBtn)c.appendChild(manageBtn);
    else{
      var mb=document.createElement('span');mb.className='qk-manage-btn';mb.setAttribute('data-manage',containerId);mb.textContent='设置';
      c.appendChild(mb);
    }
    // 重新绑定快速标签逻辑
    initQkTags(containerId,foodInputId);
    // 重建DOM后重新直接绑定设置按钮（事件委托是备份，直接绑定更可靠）
    var newMgrBtn=c.querySelector('.qk-manage-btn');
    if(newMgrBtn){
      var gid=newMgrBtn.getAttribute('data-manage');
      var cfg=tagGroupConfig[gid];
      if(cfg){
        newMgrBtn.ontouchend=newMgrBtn.onclick=function(e){
          e.stopPropagation();e.preventDefault();
          showTagManager(gid,cfg.label,function(){
            if(cfg.foodInput)rebuildFoodTags(gid,cfg.foodInput);
          });
        };
      }
    }
  }

  // 标签管理弹窗
  function showTagManager(groupId,groupLabel,onSave){
    var mask=document.createElement('div');mask.className='manage-mask';
    var box=document.createElement('div');box.className='manage-box';
    var currentTags=getTagList(groupId);

    function render(){
      var html='<div class="manage-title">⚙ 管理「'+groupLabel+'」快速选项</div>';
      html+='<div class="manage-hint">点击 ✕ 可删除选项，输入框添加新选项</div>';
      html+='<div class="manage-list" id="mgrList">';
      for(var i=0;i<currentTags.length;i++){
        html+='<span class="manage-item" data-idx="'+i+'">'+currentTags[i]+'<span class="del" data-idx="'+i+'">✕</span></span>';
      }
      if(!currentTags.length)html+='<span style="color:#555570;font-size:13px">暂无选项</span>';
      html+='</div>';
      html+='<div class="manage-add-row"><input class="manage-add-input" id="mgrInput" placeholder="输入新选项名称" maxlength="20"><button class="manage-add-btn" id="mgrAdd">+ 添加</button></div>';
      html+='<button class="manage-close" id="mgrClose">完成</button>';
      box.innerHTML=html;

      // 绑定删除
      box.querySelectorAll('.del').forEach(function(d){
        d.onclick=function(e){
          e.stopPropagation();
          var idx=parseInt(d.getAttribute('data-idx'));
          currentTags.splice(idx,1);
          render();
        };
      });

      // 绑定添加
      ge('mgrAdd').onclick=function(){
        var inp=ge('mgrInput');
        var val=inp.value.trim();
        if(!val){toast('请输入选项名称');return;}
        if(currentTags.indexOf(val)>=0){toast('该选项已存在');return;}
        if(val.length>20){toast('名称不能超过20字');return;}
        currentTags.push(val);
        render();
      };
      ge('mgrInput').onkeydown=function(e){if(e.key==='Enter'){ge('mgrAdd').click();e.preventDefault();}};

      // 绑定关闭（保存到云端）
      ge('mgrClose').onclick=function(){
        saveTagToCloud(groupId,currentTags);
        document.body.removeChild(mask);
        if(onSave)onSave();
      };
    }

    render();
    mask.appendChild(box);document.body.appendChild(mask);
    mask.onclick=function(e){if(e.target===mask){ge('mgrClose').click();}};
  }

  // 标签组配置映射
  var tagGroupConfig={
    bfTags:{label:'早餐',foodInput:'breakfastFood'},
    lcTags:{label:'午餐',foodInput:'lunchFood'},
    dnTags:{label:'晚餐',foodInput:'dinnerFood'},
    reasonMorning:{label:'早上未完成原因'},
    reasonNoon:{label:'中午未完成原因'},
    reasonEvening:{label:'晚上未完成原因'}
  };

  // 用事件委托确保管理按钮始终可点击（无论DOM如何重建）
  // 只在按钮没有自己的 onclick 时才通过委托触发（避免重复）
  document.addEventListener('click',function(e){
    var btn=e.target.closest('.qk-manage-btn');
    if(!btn)return;
    if(btn.onclick)return; // 已有直接绑定，跳过委托
    e.stopPropagation();
    e.preventDefault();
    var groupId=btn.getAttribute('data-manage');
    var cfg=tagGroupConfig[groupId];
    if(!cfg)return;
    showTagManager(groupId,cfg.label,function(){
      if(cfg.foodInput)rebuildFoodTags(groupId,cfg.foodInput);
    });
  });

  // 直接绑定初始按钮（双保险）
  // 注意：只用 click，不用 ontouchend，避免触屏设备重复触发
  function directBindMgr(id){
    var el=ge(id);if(!el)return;
    el.onclick=function(e){
      e.stopPropagation();e.preventDefault();
      var groupId=this.getAttribute('data-manage');
      var cfg=tagGroupConfig[groupId];
      if(!cfg)return;
      showTagManager(groupId,cfg.label,function(){
        if(cfg.foodInput)rebuildFoodTags(groupId,cfg.foodInput);
      });
    };
  }
  directBindMgr('mgrBf');
  directBindMgr('mgrLc');
  directBindMgr('mgrDn');

  // 页面加载：先从本地缓存恢复（秒开），再从云端同步
  (function(){
    var cached=loadTagsCache();
    if(cached){
      for(var k in cached){if(cached[k]&&cached[k].length)_tagsCloud[k]=cached[k];}
      var foodGroups=[['bfTags','breakfastFood'],['lcTags','lunchFood'],['dnTags','dinnerFood']];
      for(var i=0;i<foodGroups.length;i++){
        var gid=foodGroups[i][0],fid=foodGroups[i][1];
        if(_tagsCloud[gid])rebuildFoodTags(gid,fid);
      }
    }
    // loadTagsFromCloud 由 onLoginSuccess 触发
  })();

  // 修改未完成原因弹窗，使其使用自定义标签 + 显示管理按钮
  var _origShowReasonModal=showReasonModal;
  showReasonModal=function(unchecked,onDone){
    // 用自定义标签替换默认的快速原因
    for(var i=0;i<unchecked.length;i++){
      var secKey=unchecked[i].key;
      var rk='';
      if(secKey==='morning')rk='reasonMorning';
      else if(secKey==='noon')rk='reasonNoon';
      else if(secKey==='evening')rk='reasonEvening';
      if(rk){
        unchecked[i].qk=getTagList(rk);
        unchecked[i]._rk=rk;
      }
    }
    _origShowReasonModal(unchecked,onDone);

    // 在弹窗中插入管理按钮
    setTimeout(function(){
      var qkDivs=document.querySelectorAll('.reason-qk');
      qkDivs.forEach(function(qk,idx){
        if(idx<unchecked.length&&unchecked[idx]._rk){
          var mb=document.createElement('span');
          mb.className='qk-manage-btn';
          mb.style.cssText='display:inline-flex;margin-top:0;vertical-align:middle;';
          mb.textContent='设置';
          mb.title='管理选项';
          (function(rk,secLabel){
            mb.onclick=function(e){
              e.stopPropagation();
              showTagManager(rk,secLabel,function(){
                // 刷新弹窗中的按钮
                var newTags=getTagList(rk);
                qk.innerHTML='';
                for(var q=0;q<newTags.length;q++){
                  var btn=document.createElement('span');btn.className='reason-qk-btn';btn.textContent=newTags[q];
                  btn.onclick=function(){this.classList.toggle('sel');};
                  qk.appendChild(btn);
                }
                var mb2=document.createElement('span');mb2.className='qk-manage-btn';mb2.style.cssText='display:inline-flex;margin-top:0;vertical-align:middle;';mb2.textContent='设置';mb2.title='管理选项';
                mb2.onclick=mb.onclick;
                qk.appendChild(mb2);
              });
            };
          })(unchecked[idx]._rk,tagGroupConfig[unchecked[idx]._rk].label);
          qk.appendChild(mb);
        }
      });
    },50);
  };

  ld();updP();spw('breakfastPrice','w0');spw('lunchPrice','w1');spw('dinnerPrice','w2');
})();
</script>
